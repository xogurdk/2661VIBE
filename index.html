<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 시작이반 게임 페스티벌</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Noto+Sans+KR:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d1a;
  --panel: #13132b;
  --panel2: #1a1a38;
  --border: #2a2a5a;
  --accent: #ff3cac;
  --accent2: #7b2fff;
  --accent3: #00f0ff;
  --gold: #ffd700;
  --silver: #c0c0c0;
  --bronze: #cd7f32;
  --text: #e8e8ff;
  --text2: #8888bb;
  --green: #00ff88;
  --red: #ff4466;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── NOISE OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 999;
}

/* ── SCANLINES ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
  z-index: 998;
}

/* ════════════════════════════════
   PAGES
════════════════════════════════ */
.page { display: none; min-height: 100vh; }
.page.active { display: flex; flex-direction: column; }

/* ── LOGIN PAGE ── */
#page-login {
  justify-content: center;
  align-items: center;
  background: radial-gradient(ellipse at 30% 40%, rgba(123,47,255,0.25) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 70%, rgba(255,60,172,0.2) 0%, transparent 60%),
              var(--bg);
}

.login-box {
  background: rgba(19,19,43,0.95);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 48px 40px;
  width: 380px;
  max-width: 95vw;
  text-align: center;
  box-shadow: 0 0 60px rgba(123,47,255,0.2), 0 0 120px rgba(255,60,172,0.1);
  animation: loginAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes loginAppear {
  from { opacity: 0; transform: translateY(30px) scale(0.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.festival-logo {
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--accent);
  text-shadow: 0 0 20px var(--accent);
  margin-bottom: 6px;
  animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent); }
  to { text-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent), 0 0 60px rgba(255,60,172,0.5); }
}

.login-title {
  font-size: 28px;
  font-weight: 900;
  margin-bottom: 4px;
  background: linear-gradient(135deg, var(--accent3), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.login-subtitle { font-size: 13px; color: var(--text2); margin-bottom: 32px; }

.login-input-wrap { position: relative; margin-bottom: 16px; }

.login-input {
  width: 100%;
  background: var(--panel2);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  font-size: 16px;
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.login-input:focus {
  border-color: var(--accent2);
  box-shadow: 0 0 0 3px rgba(123,47,255,0.2);
}

.login-input::placeholder { color: var(--text2); }

.login-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  border: none;
  border-radius: 12px;
  padding: 15px;
  font-size: 16px;
  font-weight: 700;
  color: white;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 20px rgba(123,47,255,0.4);
}

.login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(123,47,255,0.5); }
.login-btn:active { transform: translateY(1px); }

.login-error {
  margin-top: 12px;
  color: var(--red);
  font-size: 13px;
  min-height: 18px;
}

/* ── HEADER ── */
header {
  background: rgba(13,13,26,0.95);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}

.header-logo {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  color: var(--accent);
  text-shadow: 0 0 10px var(--accent);
  letter-spacing: 1px;
}

.header-right { display: flex; align-items: center; gap: 16px; }

.header-user {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 14px;
  font-weight: 700;
}

.user-dot {
  width: 8px;
  height: 8px;
  background: var(--green);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--green);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.3); opacity: 0.7; }
}

.header-nav { display: flex; gap: 4px; }

.nav-btn {
  background: transparent;
  border: 1px solid transparent;
  border-radius: 10px;
  padding: 7px 14px;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.2s;
}

.nav-btn:hover, .nav-btn.active {
  background: var(--panel2);
  border-color: var(--border);
  color: var(--text);
}

.nav-btn.active { color: var(--accent3); border-color: rgba(0,240,255,0.3); }

.logout-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 7px 12px;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.2s;
}

.logout-btn:hover { border-color: var(--red); color: var(--red); }

/* ── MAIN CONTENT ── */
.main-content { flex: 1; padding: 32px 24px; max-width: 1200px; margin: 0 auto; width: 100%; }

/* ── LOBBY PAGE ── */
.lobby-hero {
  text-align: center;
  padding: 40px 0 50px;
}

.lobby-hero h1 {
  font-size: clamp(32px, 5vw, 56px);
  font-weight: 900;
  line-height: 1.1;
  background: linear-gradient(135deg, var(--accent3) 0%, var(--accent) 50%, var(--gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 12px;
}

.lobby-hero p { font-size: 15px; color: var(--text2); }

.lobby-hero .welcome-name {
  color: var(--accent3);
  font-weight: 700;
}

/* GAME CARDS GRID */
.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}

.game-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px 20px;
  cursor: pointer;
  transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  position: relative;
  overflow: hidden;
}

.game-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--card-color1, rgba(123,47,255,0.1)), var(--card-color2, rgba(255,60,172,0.05)));
  opacity: 0;
  transition: opacity 0.2s;
}

.game-card:hover {
  transform: translateY(-6px);
  border-color: var(--card-accent, var(--accent));
  box-shadow: 0 12px 40px var(--card-shadow, rgba(123,47,255,0.25));
}

.game-card:hover::before { opacity: 1; }

.game-card-emoji { font-size: 44px; margin-bottom: 14px; display: block; }

.game-card-group {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--card-accent, var(--accent));
  margin-bottom: 6px;
  opacity: 0.8;
}

.game-card-title {
  font-size: 17px;
  font-weight: 900;
  margin-bottom: 8px;
  line-height: 1.3;
}

.game-card-desc {
  font-size: 12px;
  color: var(--text2);
  line-height: 1.6;
}

.game-card-badge {
  position: absolute;
  top: 16px;
  right: 16px;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
  border: 1px solid;
}

.badge-score { background: rgba(0,240,255,0.1); border-color: var(--accent3); color: var(--accent3); }
.badge-time { background: rgba(255,215,0,0.1); border-color: var(--gold); color: var(--gold); }
.badge-play { background: rgba(0,255,136,0.1); border-color: var(--green); color: var(--green); }

/* MY SCORES PANEL */
.section-title {
  font-size: 18px;
  font-weight: 900;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.my-scores-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 40px;
}

.my-score-item {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.my-score-emoji { font-size: 24px; }

.my-score-info { flex: 1; min-width: 0; }
.my-score-name { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.my-score-val {
  font-size: 16px;
  font-weight: 900;
  color: var(--accent3);
}

.my-score-none { color: var(--text2); font-size: 14px; }

/* ── GAME PLAY PAGE ── */
#page-play {
  background: #000;
}

#page-play header {
  position: relative;
  background: rgba(0,0,0,0.9);
}

.play-header-info {
  display: flex;
  align-items: center;
  gap: 12px;
}

.play-back-btn {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 7px 14px;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.2s;
}

.play-back-btn:hover { border-color: var(--accent); color: var(--accent); }

.play-game-title { font-size: 14px; font-weight: 700; }

.play-score-flash {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  color: white;
  padding: 12px 24px;
  border-radius: 30px;
  font-size: 15px;
  font-weight: 700;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  box-shadow: 0 4px 30px rgba(123,47,255,0.5);
  white-space: nowrap;
  transition: none;
}

.play-score-flash.show {
  animation: scoreFlash 3s ease forwards;
}

@keyframes scoreFlash {
  0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
  15% { opacity: 1; transform: translateX(-50%) translateY(0); }
  70% { opacity: 1; transform: translateX(-50%) translateY(0); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
}

#game-iframe-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  background: #000;
  min-height: calc(100vh - 60px);
}

#game-iframe {
  width: 100%;
  max-width: 900px;
  height: calc(100vh - 60px);
  border: none;
  background: #000;
}

/* ── RANKING PAGE ── */
.ranking-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.rank-tab {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 8px 16px;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.2s;
}

.rank-tab:hover { border-color: var(--accent2); color: var(--text); }

.rank-tab.active {
  background: var(--panel2);
  border-color: var(--accent3);
  color: var(--accent3);
  font-weight: 700;
}

.ranking-board {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
}

.ranking-header {
  display: grid;
  grid-template-columns: 60px 1fr 120px 100px;
  padding: 14px 20px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
  background: var(--panel2);
}

.ranking-row {
  display: grid;
  grid-template-columns: 60px 1fr 120px 100px;
  padding: 14px 20px;
  border-bottom: 1px solid rgba(42,42,90,0.5);
  align-items: center;
  transition: background 0.15s;
  position: relative;
}

.ranking-row:last-child { border-bottom: none; }
.ranking-row:hover { background: var(--panel2); }

.ranking-row.me { background: rgba(0,240,255,0.05); }
.ranking-row.me::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--accent3);
  border-radius: 0 2px 2px 0;
}

.rank-pos {
  font-size: 18px;
  font-weight: 900;
  font-family: 'Press Start 2P', monospace;
}

.rank-1 { color: var(--gold); text-shadow: 0 0 10px rgba(255,215,0,0.5); }
.rank-2 { color: var(--silver); }
.rank-3 { color: var(--bronze); }
.rank-other { color: var(--text2); font-size: 13px; }

.rank-medal { font-size: 20px; }

.rank-name {
  font-size: 15px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}

.rank-name-you {
  font-size: 10px;
  background: rgba(0,240,255,0.15);
  border: 1px solid rgba(0,240,255,0.3);
  color: var(--accent3);
  padding: 2px 6px;
  border-radius: 10px;
}

.rank-label {
  font-size: 13px;
  color: var(--text2);
}

.rank-score {
  font-size: 16px;
  font-weight: 900;
  color: var(--accent3);
  text-align: right;
}

.ranking-empty {
  text-align: center;
  padding: 48px;
  color: var(--text2);
  font-size: 14px;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 700;
  z-index: 500;
  opacity: 0;
  pointer-events: none;
  white-space: nowrap;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  transition: none;
}

.toast.show { animation: toastAnim 2.5s ease forwards; }

@keyframes toastAnim {
  0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
  15% { opacity: 1; transform: translateX(-50%) translateY(0); }
  75% { opacity: 1; transform: translateX(-50%) translateY(0); }
  100% { opacity: 0; transform: translateX(-50%) translateY(10px); }
}

/* ── TOTAL RANKING ── */
.total-rank-wrap { margin-bottom: 32px; }

.total-podium {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 16px;
  margin-bottom: 32px;
  padding: 0 16px;
}

.podium-item {
  flex: 1;
  max-width: 160px;
  text-align: center;
}

.podium-avatar {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 900;
  margin: 0 auto 8px;
  border: 2px solid;
}

.podium-1 .podium-avatar { background: rgba(255,215,0,0.2); border-color: var(--gold); color: var(--gold); }
.podium-2 .podium-avatar { background: rgba(192,192,192,0.15); border-color: var(--silver); color: var(--silver); }
.podium-3 .podium-avatar { background: rgba(205,127,50,0.15); border-color: var(--bronze); color: var(--bronze); }

.podium-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.podium-pts { font-size: 20px; font-weight: 900; }
.podium-1 .podium-pts { color: var(--gold); }
.podium-2 .podium-pts { color: var(--silver); }
.podium-3 .podium-pts { color: var(--bronze); }

.podium-block {
  border-radius: 12px 12px 0 0;
  margin-top: 12px;
}
.podium-1 .podium-block { height: 80px; background: linear-gradient(to top, rgba(255,215,0,0.3), rgba(255,215,0,0.1)); border: 1px solid rgba(255,215,0,0.3); }
.podium-2 .podium-block { height: 55px; background: linear-gradient(to top, rgba(192,192,192,0.2), rgba(192,192,192,0.05)); border: 1px solid rgba(192,192,192,0.2); }
.podium-3 .podium-block { height: 40px; background: linear-gradient(to top, rgba(205,127,50,0.2), rgba(205,127,50,0.05)); border: 1px solid rgba(205,127,50,0.2); }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .main-content { padding: 20px 16px; }
  .games-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
  .game-card { padding: 16px 14px; }
  .game-card-emoji { font-size: 32px; margin-bottom: 10px; }
  .game-card-title { font-size: 14px; }
  .ranking-header, .ranking-row { grid-template-columns: 50px 1fr 90px; }
  .ranking-header > *:last-child, .ranking-row > *:last-child { display: none; }
  .header-nav { display: none; }
}

/* ── LOADING OVERLAY ── */
#loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 800;
  backdrop-filter: blur(4px);
}

#loading-overlay.show { display: flex; }

.loading-spinner {
  width: 48px;
  height: 48px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── NEW RECORD BADGE ── */
.new-record-badge {
  display: inline-block;
  background: linear-gradient(135deg, var(--gold), #ff8c00);
  color: #000;
  font-size: 10px;
  font-weight: 900;
  padding: 2px 7px;
  border-radius: 20px;
  margin-left: 6px;
  animation: badgePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes badgePop {
  from { transform: scale(0); }
  to { transform: scale(1); }
}
</style>
</head>
<body>

<!-- ════ LOGIN PAGE ════ -->
<div id="page-login" class="page active">
  <div class="login-box">
    <div class="festival-logo">🎮 GAME FESTIVAL</div>
    <div class="login-title">시작이반<br>게임 페스티벌</div>
    <div class="login-subtitle">이름을 입력하고 게임을 시작하세요!</div>
    <div class="login-input-wrap">
      <input id="login-input" class="login-input" type="text" placeholder="이름을 입력하세요" maxlength="10" autocomplete="off">
    </div>
    <button class="login-btn" onclick="doLogin()">🚀 게임 시작!</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ════ LOBBY PAGE ════ -->
<div id="page-lobby" class="page">
  <header>
    <div class="header-logo">🎮 GAME FESTIVAL</div>
    <div class="header-right">
      <nav class="header-nav">
        <button class="nav-btn active" onclick="showSection('lobby')">🏠 로비</button>
        <button class="nav-btn" onclick="showSection('ranking')">🏆 랭킹</button>
      </nav>
      <div class="header-user">
        <div class="user-dot"></div>
        <span id="header-username"></span>
      </div>
      <button class="logout-btn" onclick="doLogout()">나가기</button>
    </div>
  </header>

  <div class="main-content">
    <!-- Lobby Section -->
    <div id="section-lobby">
      <div class="lobby-hero">
        <h1>🎮 게임 페스티벌에<br>오신 걸 환영해요!</h1>
        <p><span class="welcome-name" id="welcome-name"></span>님, 5개 게임에 도전해보세요!</p>
      </div>

      <div class="section-title">🕹️ 게임 목록</div>
      <div class="games-grid" id="games-grid"></div>

      <div class="section-title">📊 내 기록</div>
      <div class="my-scores-grid" id="my-scores-grid"></div>
    </div>

    <!-- Ranking Section -->
    <div id="section-ranking" style="display:none">
      <div class="lobby-hero" style="padding:20px 0 30px">
        <h1 style="font-size:clamp(24px,4vw,40px)">🏆 명예의 전당</h1>
      </div>
      <div class="ranking-tabs" id="ranking-tabs"></div>
      <div id="ranking-content"></div>
    </div>
  </div>
</div>

<!-- ════ PLAY PAGE ════ -->
<div id="page-play" class="page">
  <header>
    <div class="play-header-info">
      <button class="play-back-btn" onclick="goBackToLobby()">← 로비</button>
      <div class="play-game-title" id="play-game-title"></div>
    </div>
    <div class="header-right">
      <div class="header-user">
        <div class="user-dot"></div>
        <span id="play-username"></span>
      </div>
    </div>
  </header>
  <div id="game-iframe-wrap">
    <iframe id="game-iframe" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
  </div>
  <div class="play-score-flash" id="score-flash"></div>
</div>

<!-- ════ SHARED UI ════ -->
<div class="toast" id="toast"></div>
<div id="loading-overlay"><div class="loading-spinner"></div></div>

<script>
// ════════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════════
const FEST_BUILD = '2026052902';
const GAMES = [
  {
    id: 1,
    file: 'game1.html',
    emoji: '🐯',
    group: '1모둠',
    title: '사람 만들기',

    accent: '#f5a623',
    color1: 'rgba(245,166,35,0.1)',
    color2: 'rgba(192,90,0,0.05)',
    shadow: 'rgba(245,166,35,0.2)',
    scoreLabel: '보유 금액',
    badgeType: 'badge-score',
    badgeText: 'GOLD',
    scoreUnit: '원',
  },
  {
    id: 2,
    file: 'game2.html',
    emoji: '🏃',
    group: '2모둠',
    title: '담율탈출기',
    desc: '3D 공간에서 탈출하라! 빠를수록 높은 점수',
    accent: '#00f0ff',
    color1: 'rgba(0,240,255,0.08)',
    color2: 'rgba(0,100,200,0.05)',
    shadow: 'rgba(0,240,255,0.2)',
    scoreLabel: '탈출 기록',
    badgeType: 'badge-time',
    badgeText: 'TIME',
    scoreUnit: '점',
  },
  {
    id: 3,
    file: 'game3.html',
    emoji: '💕',
    group: '3모둠',
    title: '연애 시뮬레이션',
    desc: '두근두근! 올바른 선택으로 연애에 성공하세요',
    accent: '#ff69b4',
    color1: 'rgba(255,105,180,0.1)',
    color2: 'rgba(200,0,100,0.05)',
    shadow: 'rgba(255,105,180,0.2)',
    scoreLabel: '성공 횟수',
    badgeType: 'badge-score',
    badgeText: 'SCORE',
    scoreUnit: '점',
  },
  {
    id: 4,
    file: 'game4.html',
    emoji: '🦝',
    group: '4모둠',
    title: '골목 질주',
    desc: '너고리를 쫓아 도시 골목을 질주! 장애물을 피하고 재료를 모아라',
    accent: '#ff3cac',
    color1: 'rgba(255,60,172,0.1)',
    color2: 'rgba(100,0,80,0.05)',
    shadow: 'rgba(255,60,172,0.2)',
    scoreLabel: '거리',
    badgeType: 'badge-score',
    badgeText: 'DIST',
    scoreUnit: 'm',
  },
  {
    id: 5,
    file: 'game5.html',
    emoji: '🟥',
    group: '5모둠',
    title: '지오매트리 대쉬',
    desc: '리듬에 맞춰 장애물을 넘어라! 8비트 리듬 러너',
    accent: '#7b2fff',
    color1: 'rgba(123,47,255,0.1)',
    color2: 'rgba(60,0,200,0.05)',
    shadow: 'rgba(123,47,255,0.2)',
    scoreLabel: '클리어 기록',
    badgeType: 'badge-time',
    badgeText: 'TIME',
    scoreUnit: '점',
  },
];

// ════════════════════════════════════════════════
// STORAGE (in-memory + localStorage)
// ════════════════════════════════════════════════
let DB = { scores: {}, gameSaves: {} };
// gameSaves: { playerName: { "1": {...}, "2": {...}, ... } }
let currentUser = null;
let currentGameId = null;

function loadDB() {
  try {
    const raw = localStorage.getItem('gfest_db');
    if (raw) {
      DB = JSON.parse(raw);
      if (!DB.scores) DB.scores = {};
      if (!DB.gameSaves) DB.gameSaves = {};
    }
  } catch(e) {}
}

function saveDB() {
  try { localStorage.setItem('gfest_db', JSON.stringify(DB)); } catch(e) {}
}

function getGameSave(playerName, gameId) {
  if (!playerName || !DB.gameSaves[playerName]) return null;
  return DB.gameSaves[playerName][String(gameId)] || null;
}

function setGameSave(playerName, gameId, data) {
  if (!playerName) return;
  if (!DB.gameSaves[playerName]) DB.gameSaves[playerName] = {};
  DB.gameSaves[playerName][String(gameId)] = { ...data, ts: Date.now() };
  saveDB();
}

function pushFestInitToGame() {
  const iframe = document.getElementById('game-iframe');
  if (!iframe || !iframe.contentWindow || !currentGameId) return;
  const data = currentUser ? getGameSave(currentUser, currentGameId) : null;
  try {
    iframe.contentWindow.postMessage({
      type: 'FEST_INIT',
      user: currentUser,
      gameId: currentGameId,
      data: data
    }, '*');
  } catch (e) {}
}

function getPlayerScores(name) {
  return DB.scores[name] || {};
}

function setPlayerScore(name, gameId, score, label) {
  if (!DB.scores[name]) DB.scores[name] = {};
  const existing = DB.scores[name][gameId];
  const isNew = !existing || score > existing.score;
  if (isNew) {
    DB.scores[name][gameId] = { score, label, ts: Date.now() };
    saveDB();
  }
  return isNew;
}

// ════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════
function doLogin() {
  const name = document.getElementById('login-input').value.trim();
  const err = document.getElementById('login-error');
  if (!name) { err.textContent = '이름을 입력해주세요!'; return; }
  if (name.length < 2) { err.textContent = '이름은 2글자 이상이어야 해요.'; return; }
  err.textContent = '';
  currentUser = name;
  document.getElementById('header-username').textContent = name;
  document.getElementById('play-username').textContent = name;
  document.getElementById('welcome-name').textContent = name;
  showPage('lobby');
  renderLobby();
}

document.getElementById('login-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogout() {
  currentUser = null;
  document.getElementById('login-input').value = '';
  document.getElementById('login-error').textContent = '';
  showPage('login');
  goBackToLobby();
}

// ════════════════════════════════════════════════
// PAGE NAVIGATION
// ════════════════════════════════════════════════
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
}

function showSection(name) {
  document.getElementById('section-lobby').style.display = name === 'lobby' ? '' : 'none';
  document.getElementById('section-ranking').style.display = name === 'ranking' ? '' : 'none';
  document.querySelectorAll('.nav-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && name === 'lobby') || (i === 1 && name === 'ranking'));
  });
  if (name === 'ranking') renderRanking();
}

// ════════════════════════════════════════════════
// LOBBY
// ════════════════════════════════════════════════
function renderLobby() {
  renderGameCards();
  renderMyScores();
}

function renderGameCards() {
  const grid = document.getElementById('games-grid');
  grid.innerHTML = '';
  GAMES.forEach(g => {
    const card = document.createElement('div');
    card.className = 'game-card';
    card.style.setProperty('--card-accent', g.accent);
    card.style.setProperty('--card-color1', g.color1);
    card.style.setProperty('--card-color2', g.color2);
    card.style.setProperty('--card-shadow', g.shadow);
    card.innerHTML = `
      <span class="game-card-badge ${g.badgeType}">${g.badgeText}</span>
      <span class="game-card-emoji">${g.emoji}</span>
      <div class="game-card-group">${g.group}</div>
      <div class="game-card-title">${g.title}</div>
      <div class="game-card-desc">${g.desc}</div>
    `;
    card.onclick = () => startGame(g.id);
    grid.appendChild(card);
  });
}

function renderMyScores() {
  const grid = document.getElementById('my-scores-grid');
  grid.innerHTML = '';
  const pScores = getPlayerScores(currentUser);
  GAMES.forEach(g => {
    const item = document.createElement('div');
    item.className = 'my-score-item';
    const sc = pScores[g.id];
    item.innerHTML = `
      <div class="my-score-emoji">${g.emoji}</div>
      <div class="my-score-info">
        <div class="my-score-name">${g.group} ${g.title}</div>
        ${sc
          ? `<div class="my-score-val">${sc.label || sc.score + g.scoreUnit}</div>`
          : `<div class="my-score-none">미도전</div>`}
      </div>
    `;
    grid.appendChild(item);
  });
}

// ════════════════════════════════════════════════
// GAME PLAY
// ════════════════════════════════════════════════
function startGame(gameId) {
  currentGameId = gameId;
  const g = GAMES.find(x => x.id === gameId);
  document.getElementById('play-game-title').textContent = `${g.emoji} ${g.group} - ${g.title}`;
  const iframe = document.getElementById('game-iframe');
  showLoading(true);
  iframe.onload = () => {
    showLoading(false);
    pushFestInitToGame();
  };
  iframe.src = g.file + (g.file.indexOf('?') >= 0 ? '&' : '?') + 'b=' + FEST_BUILD;
  showPage('play');
}

function goBackToLobby() {
  const iframe = document.getElementById('game-iframe');
  iframe.src = 'about:blank';
  currentGameId = null;
  showPage('lobby');
  renderMyScores();
}

// MESSAGES FROM GAME IFRAME
window.addEventListener('message', e => {
  const d = e.data;
  if (!d || typeof d !== 'object') return;

  if (d.type === 'FEST_LOAD' && currentUser) {
    const iframe = document.getElementById('game-iframe');
    const data = getGameSave(currentUser, d.gameId);
    if (iframe && iframe.contentWindow) {
      try {
        iframe.contentWindow.postMessage({
          type: 'FEST_DATA',
          user: currentUser,
          gameId: d.gameId,
          data: data
        }, '*');
      } catch (err) {}
    }
    return;
  }

  if (d.type === 'FEST_SAVE' && currentUser) {
    setGameSave(currentUser, d.gameId, d.data || {});
    return;
  }

  if (d.type === 'FEST_READY' && currentUser && currentGameId === d.gameId) {
    pushFestInitToGame();
    return;
  }

  if (d.type !== 'GAME_SCORE' || !currentUser) return;

  const gameId = d.gameId;
  const score = d.score;
  const label = d.label || (score + '점');
  const g = GAMES.find(x => x.id === gameId);
  if (!g) return;

  const isNew = setPlayerScore(currentUser, gameId, score, label);

  const flash = document.getElementById('score-flash');
  flash.className = 'play-score-flash';
  flash.textContent = isNew
    ? `🏆 신기록! ${g.title}: ${label}`
    : `✅ 기록됨: ${g.title}: ${label}`;
  void flash.offsetWidth;
  flash.classList.add('show');
});

// ════════════════════════════════════════════════
// RANKING
// ════════════════════════════════════════════════
let currentRankTab = 0; // 0 = total, 1-5 = game id

function renderRanking() {
  renderRankTabs();
  renderRankContent();
}

function renderRankTabs() {
  const tabs = document.getElementById('ranking-tabs');
  tabs.innerHTML = '';
  const allTabs = [{ id: 0, label: '🏅 종합 랭킹' }, ...GAMES.map(g => ({ id: g.id, label: g.emoji + ' ' + g.title }))];
  allTabs.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'rank-tab' + (currentRankTab === t.id ? ' active' : '');
    btn.textContent = t.label;
    btn.onclick = () => { currentRankTab = t.id; renderRankTabs(); renderRankContent(); };
    tabs.appendChild(btn);
  });
}

function renderRankContent() {
  const content = document.getElementById('ranking-content');
  if (currentRankTab === 0) {
    renderTotalRanking(content);
  } else {
    renderGameRanking(content, currentRankTab);
  }
}

function getTotalScore(name) {
  const sc = getPlayerScores(name);
  return Object.values(sc).reduce((sum, v) => sum + v.score, 0);
}

function getAllPlayers() {
  return Object.keys(DB.scores);
}

function renderTotalRanking(container) {
  const players = getAllPlayers()
    .map(name => ({ name, total: getTotalScore(name), gameCount: Object.keys(getPlayerScores(name)).length }))
    .sort((a, b) => b.total - a.total);

  if (players.length === 0) {
    container.innerHTML = `<div class="ranking-board"><div class="ranking-empty">아직 기록이 없어요! 게임을 플레이해보세요 🎮</div></div>`;
    return;
  }

  // Podium (top 3)
  const top3 = players.slice(0, 3);
  const podiumOrder = top3.length >= 3 ? [top3[1], top3[0], top3[2]] : (top3.length === 2 ? [top3[1], top3[0]] : [top3[0]]);
  const podiumClass = top3.length >= 3 ? ['podium-2', 'podium-1', 'podium-3'] : (top3.length === 2 ? ['podium-2', 'podium-1'] : ['podium-1']);
  const podiumIdx = top3.length >= 3 ? [2, 1, 3] : (top3.length === 2 ? [2, 1] : [1]);
  const medals = ['🥇', '🥈', '🥉'];

  let podiumHtml = `<div class="total-podium">`;
  podiumOrder.forEach((p, i) => {
    const rank = players.indexOf(p) + 1;
    podiumHtml += `<div class="podium-item ${podiumClass[i]}">
      <div class="podium-avatar">${p.name.charAt(0)}</div>
      <div class="podium-name">${p.name}</div>
      <div class="podium-pts">${p.total.toLocaleString()}점</div>
      <div class="podium-block"></div>
    </div>`;
  });
  podiumHtml += `</div>`;

  let boardHtml = `
    <div class="ranking-board">
      <div class="ranking-header">
        <div>순위</div><div>이름</div><div>도전 게임</div><div style="text-align:right">총점</div>
      </div>`;

  players.forEach((p, i) => {
    const isMe = p.name === currentUser;
    const rank = i + 1;
    let posHtml;
    if (rank === 1) posHtml = `<span class="rank-pos rank-1">🥇</span>`;
    else if (rank === 2) posHtml = `<span class="rank-pos rank-2">🥈</span>`;
    else if (rank === 3) posHtml = `<span class="rank-pos rank-3">🥉</span>`;
    else posHtml = `<span class="rank-pos rank-other">${rank}</span>`;

    boardHtml += `<div class="ranking-row ${isMe ? 'me' : ''}">
      <div>${posHtml}</div>
      <div class="rank-name">${p.name}${isMe ? '<span class="rank-name-you">나</span>' : ''}</div>
      <div class="rank-label">${p.gameCount}/5 게임</div>
      <div class="rank-score">${p.total.toLocaleString()}점</div>
    </div>`;
  });

  boardHtml += `</div>`;
  container.innerHTML = podiumHtml + boardHtml;
}

function renderGameRanking(container, gameId) {
  const g = GAMES.find(x => x.id === gameId);
  const players = getAllPlayers()
    .filter(name => DB.scores[name] && DB.scores[name][gameId])
    .map(name => {
      const sc = DB.scores[name][gameId];
      return { name, score: sc.score, label: sc.label, ts: sc.ts };
    })
    .sort((a, b) => b.score - a.score);

  if (players.length === 0) {
    container.innerHTML = `<div class="ranking-board"><div class="ranking-empty">${g.emoji} ${g.title} 기록이 아직 없어요!</div></div>`;
    return;
  }

  let html = `<div class="ranking-board">
    <div class="ranking-header">
      <div>순위</div><div>이름</div><div>기록</div><div style="text-align:right">점수</div>
    </div>`;

  players.forEach((p, i) => {
    const isMe = p.name === currentUser;
    const rank = i + 1;
    let posHtml;
    if (rank === 1) posHtml = `<span class="rank-pos rank-1">🥇</span>`;
    else if (rank === 2) posHtml = `<span class="rank-pos rank-2">🥈</span>`;
    else if (rank === 3) posHtml = `<span class="rank-pos rank-3">🥉</span>`;
    else posHtml = `<span class="rank-pos rank-other">${rank}</span>`;

    html += `<div class="ranking-row ${isMe ? 'me' : ''}">
      <div>${posHtml}</div>
      <div class="rank-name">${p.name}${isMe ? '<span class="rank-name-you">나</span>' : ''}</div>
      <div class="rank-label">${p.label}</div>
      <div class="rank-score">${p.score.toLocaleString()}</div>
    </div>`;
  });

  html += `</div>`;
  container.innerHTML = html;
}

// ════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast';
  void t.offsetWidth;
  t.classList.add('show');
}

function showLoading(v) {
  document.getElementById('loading-overlay').classList.toggle('show', v);
}

// ════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════
loadDB();
</script>
</body>
</html>
