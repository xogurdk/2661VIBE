
<style>
/* ── OPENING SCREEN ── */
@import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@700;800&family=Jua&display=swap');

#opening{
  position:fixed;inset:0;z-index:100;
  background:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Nanum Gothic',sans-serif;
}

/* ── Phase 0: 아바타 선택 ── */
#ph-avatar{display:flex;flex-direction:column;align-items:center;gap:24px;}
#ph-avatar h1{font-family:'Jua',sans-serif;font-size:2rem;color:#333;letter-spacing:2px;margin:0;}
.avatar-row{display:flex;gap:60px;align-items:flex-start;}
.avatar-col{display:flex;flex-direction:column;align-items:center;gap:8px;}
.gender-btn{
  font-family:'Jua',sans-serif;font-size:1rem;
  padding:8px 28px;border-radius:24px;border:none;cursor:pointer;
  transition:transform .15s,box-shadow .15s;
}
.gender-btn.boy{background:#4a90e2;color:#fff;}
.gender-btn.girl{background:#e26a8a;color:#fff;}
.gender-btn:hover{transform:scale(1.08);box-shadow:0 4px 16px rgba(0,0,0,.18);}

.avatar-svg{width:110px;height:130px;}
.avatar-name{font-size:.95rem;color:#555;font-weight:700;}

/* ── Phase 1: 애니메이션 씬 ── */
#ph-scene{display:none;position:relative;width:100%;max-width:520px;}
.scene-frame{
  width:100%;background:#f8f4ee;border-radius:18px;
  border:2.5px solid #e0d8cc;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;
  padding:24px 16px 20px;gap:0;
  box-shadow:0 8px 32px rgba(0,0,0,.10);
}
.scene-stage{display:flex;align-items:flex-end;justify-content:center;gap:32px;min-height:160px;position:relative;}
.char-wrap{display:flex;flex-direction:column;align-items:center;position:relative;}
.bubble{
  background:#fff;border:2px solid #bbb;border-radius:14px 14px 14px 4px;
  padding:6px 12px;font-size:.82rem;color:#333;white-space:nowrap;
  position:absolute;top:-46px;left:50%;transform:translateX(-50%);
  box-shadow:0 2px 8px rgba(0,0,0,.10);
  opacity:0;transition:opacity .4s;
  min-width:80px;text-align:center;
}
.bubble.mom-bubble{border-radius:14px 14px 4px 14px;}
.bubble.show{opacity:1;}
.scene-btn{
  margin-top:18px;
  font-family:'Jua',sans-serif;font-size:1rem;
  padding:10px 36px;border-radius:24px;border:none;
  background:#4a7fe2;color:#fff;cursor:pointer;
  transition:transform .15s,background .15s;
}
.scene-btn:hover{transform:scale(1.06);background:#2a5fc2;}

/* ── Phase 2: 난이도 선택 ── */
#ph-diff{display:none;flex-direction:column;align-items:center;gap:28px;width:100%;}
#ph-diff h2{font-family:'Jua',sans-serif;font-size:1.6rem;color:#333;margin:0;letter-spacing:2px;}
.diff-row{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
.diff-card{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  background:#f8f4ee;border:2.5px solid #d4cfc7;border-radius:16px;
  padding:18px 24px;cursor:pointer;
  transition:transform .15s,border-color .15s,box-shadow .15s;
  min-width:100px;position:relative;
}
.diff-card:not(.locked):hover{transform:translateY(-4px);border-color:#4a90e2;box-shadow:0 8px 24px rgba(74,144,226,.18);}
.diff-card.locked{opacity:.42;cursor:not-allowed;filter:grayscale(.5);}
.diff-card .lock-x{
  position:absolute;top:8px;right:10px;font-size:1.3rem;
}
.diff-hearts{font-size:1.1rem;color:#e26a8a;}
.diff-label{font-family:'Jua',sans-serif;font-size:1.1rem;color:#333;}

/* ── Phase 3: START 버튼 ── */
#ph-start{display:none;flex-direction:column;align-items:center;gap:20px;}
#ph-start p{font-family:'Jua',sans-serif;font-size:1.1rem;color:#555;}
#start-btn{
  font-family:'Jua',sans-serif;font-size:1.4rem;letter-spacing:4px;
  padding:16px 60px;border-radius:30px;border:none;
  background:linear-gradient(135deg,#4a90e2,#2a5fc2);
  color:#fff;cursor:pointer;
  box-shadow:0 6px 28px rgba(74,144,226,.38);
  transition:transform .18s,box-shadow .18s;
}
#start-btn:hover{transform:scale(1.07);box-shadow:0 10px 36px rgba(74,144,226,.52);}

/* ── shared ── */
.fade-in{animation:fadeIn .5s ease forwards;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>

<script>
(function(){
var NR=14,NC=20,T=2.6;
var PI2=Math.PI*2,PHMAX=Math.PI*0.44;

// ══════════════════════════════════════════════════
// 맵: 넓은 방 + 복도 구조 (미로X, 방 탐색O)
// S = 플레이어 시작 (파란 불)
// E = 탈출구 (초록 불)
// 모든 통로는 명확히 열려 있음
// ══════════════════════════════════════════════════
var MAPS=[
// R1: 3개 방 + 복도
["####################",
 "#S.......#.........#",
 "#........#.........#",
 "#........#.........#",
 "#........#.........#",
 "####.#####.####.####",
 "#..................#",
 "####.#####.####.####",
 "#........#.........#",
 "#........#.........#",
 "#........#.........#",
 "#........#.........#",
 "#........#.........#",
 "########.#####E#####"],
// R2: 4개 방 + 중앙 홀
["####################",
 "#S......#..........#",
 "#.......#..........#",
 "#.......#..........#",
 "####.####..####.####",
 "#..................#",
 "#...####....####...#",
 "#...#..#....#..#...#",
 "#...#..#....#..#...#",
 "#...####....####...#",
 "#..................#",
 "####.####..####.####",
 "#..........#.......#",
 "#####.#####.####E###"],
// R3: L자형 방들 + 긴 복도
["####################",
 "#S.....#...........#",
 "#......#...........#",
 "#......#...........#",
 "#......#############",
 "#......#...........#",
 "#......#...........#",
 "####.###...........#",
 "#..........#########",
 "#..........#.......#",
 "#..........#.......#",
 "########.###.......#",
 "#..........#.......#",
 "#####.######.###E###"],
// R4: 복잡한 방 미로
["####################",
 "#S...#.....#.......#",
 "#....#.....#.......#",
 "#....#.....#.......#",
 "#....#.#####.#######",
 "#....#.............#",
 "#....#.#####.#######",
 "#....#.#...#.......#",
 "##.###.#...#.......#",
 "#......#...#########",
 "#......#...........#",
 "#......#...........#",
 "#......#...........#",
 "########.######E####"]
];

// 맵 정규화 (14×20 엄격 보장)
MAPS.forEach(function(m){
  while(m.length<NR)m.push('####################'.slice(0,NC));
  m.length=NR;
  for(var i=0;i<NR;i++){
    var row=m[i];
    while(row.length<NC)row+='#';
    m[i]=row.slice(0,NC);
  }
});

var CFGS=[
 {name:"Round 1 — 쉬움",
  desc:"🗝 열쇠 찾기 → 🟢정문 탈출!\n🔴아빠 + 🩷엄마 등장",
  mis:["🗝 열쇠"],npc:2,spd:[2.2,1.9],los:12,fov:0.82},
 {name:"Round 2 — 보통",
  desc:"🗝 열쇠 + 📱 핸드폰 → 창문!\n🔴아빠 + 🩷엄마 (빠름)",
  mis:["🗝 열쇠","📱 핸드폰"],npc:2,spd:[2.9,2.6],los:15,fov:0.95},
 {name:"Round 3 — 어려움",
  desc:"🗝 + 📱 + 🔦 손전등 → 뒷문!\n🔴아빠 + 🩷엄마 (매우 빠름)",
  mis:["🗝 열쇠","📱 핸드폰","🔦 손전등"],npc:2,spd:[3.5,3.1],los:17,fov:1.02},
 {name:"Round 4 — 지옥",
  desc:"🗝🗝 + 📱 + 🔦 + 🧦 → 비상구!\n🔴아빠 + 🩷엄마 + 👴삼촌",
  mis:["🗝 열쇠1","🗝 열쇠2","📱 핸드폰","🔦 손전등","🧦 양말"],npc:3,spd:[4.0,3.6,3.2],los:19,fov:1.12}
];

var NPCCLR=[0xdd2200,0xff1188,0x1155dd];
var NPCBODY=[0xaa1800,0xcc0066,0x0a2288];

var curR=0,cfg,cmap;
var gst='menu',t0=0,aLvl=0;
var bests=[null,null,null,null];
var scene,rdr,cam,pivot;
var obsMeshes=[],obsGrid=[];
var items=[],gotItem=[],npcs=[];

var yaw=0,pitch=0;
var locked=false,pdx=0,pdy=0,msgT=0;
var ROOT=document.getElementById('G');
var CVW=Math.max(ROOT.clientWidth||680,400),CVH=620;
var cv=document.getElementById('gc');cv.width=CVW;cv.height=CVH;
var mmcv=document.getElementById('mm');var mc=mmcv.getContext('2d');
var RC=new THREE.Raycaster();var _v=new THREE.Vector3();

// 맵 헬퍼
function ch(c,r){
  if(r<0||r>=NR||c<0||c>=NC)return'#';
  var row=cmap[r];if(!row||c>=row.length)return'#';
  return row[c];
}
function isFloor(c,r){var t=ch(c,r);return t==='.'||t==='E'||t==='S';}
function canWalk(c,r){
  if(!isFloor(c,r))return false;
  if(obsGrid[r]&&obsGrid[r][c])return false;
  return true;
}
function canXZ(x,z){return canWalk(Math.floor(x/T),Math.floor(z/T));}

function findOpen(c0,r0){
  if(canWalk(c0,r0))return{c:c0,r:r0};
  for(var d=1;d<=8;d++)
    for(var dr=-d;dr<=d;dr++) for(var dc=-d;dc<=d;dc++)
      if((Math.abs(dr)===d||Math.abs(dc)===d)&&canWalk(c0+dc,r0+dr))return{c:c0+dc,r:r0+dr};
  for(var r=0;r<NR;r++) for(var c=0;c<NC;c++) if(canWalk(c,r))return{c:c,r:r};
  return{c:1,r:1};
}

function findCell(type){
  for(var r=0;r<NR;r++) for(var c=0;c<NC;c++) if(ch(c,r)===type)return{c:c,r:r};
  return null;
}

function buildObsGrid(){
  obsGrid=[];
  for(var r=0;r<NR;r++){obsGrid.push([]);for(var c=0;c<NC;c++)obsGrid[r].push(false);}
  var ep=findCell('E')||{c:NC-2,r:NR-2};
  var sp=findCell('S')||{c:1,r:1};
  var limit=[5,7,9,11][curR];
  var placed=0;
  for(var r=2;r<NR-2&&placed<limit;r+=3){
    for(var c=2;c<NC-2&&placed<limit;c+=4){
      if(!isFloor(c,r))continue;
      var de=(c-ep.c)*(c-ep.c)+(r-ep.r)*(r-ep.r);
      var ds=(c-sp.c)*(c-sp.c)+(r-sp.r)*(r-sp.r);
      if(de<16||ds<9)continue;
      // 4방향 중 최소 2개 열린 경우만
      var open=0;
      if(isFloor(c-1,r))open++;if(isFloor(c+1,r))open++;
      if(isFloor(c,r-1))open++;if(isFloor(c,r+1))open++;
      if(open>=2){obsGrid[r][c]=true;placed++;}
    }
  }
}

      var cm=new THREE.Mesh(new THREE.BoxGeometry(T,0.1,T),cM);
      cm.position.set(wx,3.6,wz);scene.add(cm);

      // 입구 S — 파란 불
      if(t==='S'){
        startX=wx;startZ=wz;
        // 파란 발광 패널 (바닥)

          new THREE.MeshLambertMaterial({color:0x2244ff,emissive:0x1133ff,emissiveIntensity:1.2}));
        sp2.position.set(wx,0.07,wz);scene.add(sp2);

      new THREE.MeshLambertMaterial({color:0x2a1808}));

  }
}

// FOV 콘
function makeCone(fov,los){
  var SEG=24,verts=new Float32Array((SEG+2)*3);
  verts[0]=0;verts[1]=0.07;verts[2]=0;
  for(var i=0;i<=SEG;i++){
    var a=-fov/2+fov*i/SEG,b=(i+1)*3;
    verts[b]=Math.sin(a)*los;verts[b+1]=0.07;verts[b+2]=-Math.cos(a)*los;
  }
  var tri=[];for(var i=0;i<SEG;i++)tri.push(0,i+1,i+2);
  var geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(verts,3));
  geo.setIndex(new THREE.BufferAttribute(new Uint16Array(tri),1));
  return new THREE.Mesh(geo,new THREE.MeshBasicMaterial(
    {color:0xffaa00,transparent:true,opacity:0.13,side:THREE.DoubleSide,depthWrite:false}));
}
function makeLines(fov,los){
  var pts=new Float32Array([
    0,0.45,0,Math.sin(-fov/2)*los,0.45,-Math.cos(-fov/2)*los,
    0,0.45,0,Math.sin(fov/2)*los,0.45,-Math.cos(fov/2)*los
  ]);
  var geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.BufferAttribute(pts,3));
  return new THREE.LineSegments(geo,new THREE.LineBasicMaterial({color:0xffcc00,transparent:true,opacity:0.6}));
}

function spawnNPCs(){
  npcs.forEach(function(n){scene.remove(n.m);if(n.cone)scene.remove(n.cone);if(n.line)scene.remove(n.line);});
  npcs=[];
  // 플레이어 시작과 먼 사분면에 배치
  var sp=findCell('S')||{c:1,r:1};
  var quadCandidates=[];
  // 맵을 4사분면으로 나눠 먼 곳부터 후보 수집
  var quads=[
    {c1:NC/2,c2:NC-1,r1:0,     r2:NR/2},
    {c1:0,   c2:NC/2,r1:NR/2,  r2:NR-1},
    {c1:NC/2,c2:NC-1,r1:NR/2,  r2:NR-1},
    {c1:0,   c2:NC/2,r1:0,     r2:NR/2}
  ];
  quads.forEach(function(q){
    var best=null,bestD=-1;
    for(var r=Math.floor(q.r1)+1;r<Math.floor(q.r2)-1;r++)
      for(var c=Math.floor(q.c1)+1;c<Math.floor(q.c2)-1;c++){
        if(!canWalk(c,r))continue;
        var d=(c-sp.c)*(c-sp.c)+(r-sp.r)*(r-sp.r);
        if(d>bestD){bestD=d;best={c:c,r:r};}
      }
    if(best)quadCandidates.push(best);
  });

  for(var i=0;i<cfg.npc;i++){
    var pos=quadCandidates[i%quadCandidates.length]||findOpen(NC/2,NR/2);
    var a=Math.random()*PI2;
    var cone=makeCone(cfg.fov,cfg.los);scene.add(cone);
    var line=makeLines(cfg.fov,cfg.los);scene.add(line);
    npcs.push({
      m:mkNPC(i),x:pos.c*T+T/2,z:pos.r*T+T/2,
      spd:cfg.spd[i],dx:Math.sin(a),dz:-Math.cos(a),
      state:'roam',timer:0,dur:0.8+Math.random()*1.8,
      wait:0,ax:0,az:0,cone:cone,line:line,sees:false,impulseCd:0
    });
  }
}

function newDir(n){
  var a=Math.random()*PI2;n.dx=Math.sin(a);n.dz=-Math.cos(a);
  n.timer=0;n.dur=0.6+Math.random()*2.0;
}
function moveNPC(n,vx,vz){
  var nx=n.x+vx,nz=n.z+vz;
  if(canXZ(nx,nz)){n.x=nx;n.z=nz;return true;}
  if(canXZ(nx,n.z)){n.x=nx;return true;}
  if(canXZ(n.x,nz)){n.z=nz;return true;}
  return false;
}

function tickNPC(n,dt){
  n.timer+=dt;n.impulseCd=Math.max(0,n.impulseCd-dt);
  if(n.state==='roam'){
    if(n.timer>=n.dur){
      var rv=Math.random();
      if(rv<0.22){n.dx*=-1;n.dz*=-1;n.timer=0;n.dur=0.5+Math.random()*1.2;}
      else if(rv<0.44){newDir(n);}
      else if(rv<0.57){n.state='wait';n.wait=0.2+Math.random()*0.8;n.timer=0;}
      else if(rv<0.68&&n.impulseCd<=0){n.state='sprint';n.wait=0.3+Math.random()*0.5;n.timer=0;n.impulseCd=2.5;}
      else{var a=Math.atan2(n.dx,-n.dz)+(Math.random()<0.5?Math.PI/2:-Math.PI/2);n.dx=Math.sin(a);n.dz=-Math.cos(a);n.timer=0;n.dur=0.6+Math.random()*1.5;}
    }
    if(!moveNPC(n,n.dx*n.spd*dt,n.dz*n.spd*dt)){
      if(Math.random()<0.5){n.dx*=-1;n.dz*=-1;}else newDir(n);
      n.timer=0;n.dur=0.4+Math.random()*1.0;
    }
  } else if(n.state==='wait'){
    n.wait-=dt;if(n.wait<=0){n.state='roam';newDir(n);}
  } else if(n.state==='sprint'){
    n.wait-=dt;
    if(n.wait<=0){n.state='roam';newDir(n);}
    else if(!moveNPC(n,n.dx*n.spd*2.3*dt,n.dz*n.spd*2.3*dt)){n.state='roam';newDir(n);}
  } else if(n.state==='alert'){
    var ex=n.ax-n.x,ez=n.az-n.z,ed=Math.sqrt(ex*ex+ez*ez);
    if(ed<0.5||n.timer>4){n.state='roam';newDir(n);}
    else{
      if(!moveNPC(n,ex/ed*n.spd*1.8*dt,ez/ed*n.spd*1.8*dt)){n.state='roam';newDir(n);}
      else{n.dx=ex/ed;n.dz=ez/ed;}
    }
  }
  n.m.position.set(n.x,0,n.z);
  var fa=Math.atan2(n.dx,-n.dz);
  n.m.rotation.y=fa+Math.PI;
  n.cone.position.set(n.x,0,n.z);n.cone.rotation.y=fa;
  n.line.position.set(n.x,0,n.z);n.line.rotation.y=fa;
  var sc=n.sees?0xff2200:0xffaa00;
  n.cone.material.color.setHex(sc);n.cone.material.opacity=n.sees?0.4:0.13;
  n.line.material.color.setHex(n.sees?0xff4400:0xffcc00);n.line.material.opacity=n.sees?1:0.58;
}

function losCheck(n){
  var dx=P.x-n.x,dz=P.z-n.z,dist=Math.sqrt(dx*dx+dz*dz);
  if(dist<0.01||dist>cfg.los)return false;
  var dot=n.dx*(dx/dist)+n.dz*(dz/dist);
  if(dot<Math.cos(cfg.fov/2))return false;
  var steps=Math.ceil(dist/0.32)+1;
  for(var i=1;i<steps;i++){
    var f=i/steps;
    if(ch(Math.floor((n.x+dx*f)/T),Math.floor((n.z+dz*f)/T))==='#')return false;
  }
  if(obsMeshes.length>0){
    _v.set(n.x,1.0,n.z);
    RC.set(_v,new THREE.Vector3(dx/dist,0,dz/dist));
    RC.far=dist-0.28;
    if(RC.intersectObjects(obsMeshes,false).length>0)return false;
  }
  return true;
}

// 미니맵
function drawMM(){
  var MW=140,MH=98,cw=MW/NC,ch2=MH/NR;
  mc.fillStyle='#110f08';mc.fillRect(0,0,MW,MH);
  for(var r=0;r<NR;r++) for(var c=0;c<NC;c++){
    var t=ch(c,r);
    if(t==='#')mc.fillStyle='#3e3228';
    else if(t==='E')mc.fillStyle='#00cc44';
    else if(t==='S')mc.fillStyle='#2244ee';
    else if(obsGrid[r]&&obsGrid[r][c])mc.fillStyle='#7a5a1a';
    else mc.fillStyle='#6a5535';
    mc.fillRect(c*cw+.2,r*ch2+.2,cw-.4,ch2-.4);
  }
  npcs.forEach(function(n){
    mc.save();mc.translate((n.x/T)*cw,(n.z/T)*ch2);
    var na=Math.atan2(n.dx,n.dz)-Math.PI/2;
    var lr=(cfg.los/T)*Math.min(cw,ch2)*0.82;
    mc.beginPath();mc.moveTo(0,0);mc.arc(0,0,lr,na-cfg.fov/2,na+cfg.fov/2);mc.closePath();
    mc.fillStyle=n.sees?'rgba(255,40,0,0.38)':'rgba(255,180,0,0.2)';mc.fill();mc.restore();
  });
  items.forEach(function(it,i){
    if(!gotItem[i]){mc.fillStyle='#ffd700';mc.beginPath();mc.arc((it.x/T)*cw,(it.z/T)*ch2,2.2,0,PI2);mc.fill();}
  });
  npcs.forEach(function(n,i){
    mc.fillStyle=[' #ff3300','#ff22aa','#2244ee'][i]||'#888';
    mc.beginPath();mc.arc((n.x/T)*cw,(n.z/T)*ch2,3,0,PI2);mc.fill();
  });
  var px=(P.x/T)*cw,pz=(P.z/T)*ch2;
  mc.fillStyle='#88aaff';mc.beginPath();mc.arc(px,pz,3.5,0,PI2);mc.fill();
  mc.strokeStyle='#aaccff';mc.lineWidth=1.5;mc.beginPath();
  mc.moveTo(px,pz);mc.lineTo(px+(-Math.sin(yaw))*11,pz+(-Math.cos(yaw))*11);mc.stroke();
}

  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i];
    if(t.identifier===joyId){
      e.preventDefault();
      var dx=t.clientX-joyOX, dy=t.clientY-joyOY;
      var dist=Math.sqrt(dx*dx+dy*dy);
      var cap=joyR;
      if(dist>cap){dx=dx/dist*cap;dy=dy/dist*cap;}
      vknob.style.left=(33+dx)+'px'; vknob.style.top=(33+dy)+'px';
      touchMoveK.x=dx/cap; touchMoveK.y=dy/cap;
    }
    if(t.identifier===lookId){
      e.preventDefault();
    }
  }
},{ passive:false });
document.addEventListener('touchend',function(e){
  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i];
    if(t.identifier===joyId){joyId=null;touchMoveK.x=0;touchMoveK.y=0;vknob.style.left='33px';vknob.style.top='33px';}
    if(t.identifier===lookId){lookId=null;}
  }
});

// 시점 터치 (우측 영역)
var lastLookX=0,lastLookY=0;
tlook.addEventListener('touchstart',function(e){
  e.preventDefault();
  var t=e.changedTouches[0];
  lookId=t.identifier; lastLookX=t.clientX; lastLookY=t.clientY;
},{ passive:false });
document.addEventListener('touchmove',function(e){
  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i];
    if(t.identifier===lookId){
      pdx+=(t.clientX-lastLookX)*1.8;
      pdy+=(t.clientY-lastLookY)*1.8;
      lastLookX=t.clientX; lastLookY=t.clientY;
    }
  }
},{ passive:false });

function startRound(r){
  curR=r;cfg=CFGS[r];cmap=MAPS[r];
  buildScene();spawnItems();spawnNPCs();
  var sc=findCell('S')||{c:1,r:1};
  P.x=sc.c*T+T/2;P.z=sc.r*T+T/2;
  yaw=0;pitch=0;
  pivot.position.set(P.x,1.35,P.z);pivot.rotation.y=0;cam.rotation.x=0;
  aLvl=0;gst='playing';t0=performance.now();
  document.getElementById('rn').textContent=cfg.name;
  document.getElementById('ah').style.display='none';
  document.getElementById('df').style.width='0';
  setOv(false);updMis();
  if(isTouch){ locked=true; showTouchUI(true); } else { reqLock(); }
}
function showMenu(r){
  curR=r;cfg=CFGS[r];cmap=MAPS[r];gst='menu';
  if(document.exitPointerLock)document.exitPointerLock();
  document.getElementById('lk').style.display='none';
  showTouchUI(false);
  setOv(true,cfg.name,
    cfg.desc+'\n\n<span style="color:#556;font-size:.7em">🔵=입구 | 🟢=탈출구 | 📦뒤 은신 가능</span>',
    bests[r]?'최고기록: '+fmt(bests[r]):'','시  작',function(){startRound(r);});
}

var K={};
window.addEventListener('keydown',function(e){K[e.code]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(e.code)>=0)e.preventDefault();});
window.addEventListener('keyup',function(e){K[e.code]=false;});
window.addEventListener('resize',function(){
  CVW=Math.max(ROOT.clientWidth||680,400);
  if(rdr)rdr.setSize(CVW,CVH);
  if(cam){cam.aspect=CVW/CVH;cam.updateProjectionMatrix();}
  cv.width=CVW;cv.height=CVH;
});

var lt=0;
function loop(now){
  requestAnimationFrame(loop);
  var dt=Math.min((now-lt)/1000,0.05);lt=now;
  if(gst!=='playing'){if(rdr&&scene&&cam)rdr.render(scene,cam);return;}
  document.getElementById('tm').textContent=fmt(performance.now()-t0);

  yaw-=pdx*0.0022;pitch-=pdy*0.0022;
  pitch=Math.max(-PHMAX,Math.min(PHMAX,pitch));
  pdx=0;pdy=0;
  pivot.rotation.y=yaw;cam.rotation.x=pitch;

  var fx=-Math.sin(yaw),fz=-Math.cos(yaw),rx=Math.cos(yaw),rz=-Math.sin(yaw);
  var mx=0,mz=0;
  if(K['KeyW']||K['ArrowUp'])   {mx+=fx;mz+=fz;}
  if(K['KeyS']||K['ArrowDown']) {mx-=fx;mz-=fz;}
  if(K['KeyA']||K['ArrowLeft']) {mx-=rx;mz-=rz;}
  if(K['KeyD']||K['ArrowRight']){mx+=rx;mz+=rz;}
  // 터치 조이스틱
  if(touchMoveK.x||touchMoveK.y){
    mx+=fx*(-touchMoveK.y)+rx*touchMoveK.x;
    mz+=fz*(-touchMoveK.y)+rz*touchMoveK.x;
  }
  var sp2=5.5*dt,rd=0.3;
  if(mx||mz){
    var ml=Math.sqrt(mx*mx+mz*mz);mx=mx/ml*sp2;mz=mz/ml*sp2;
    if(canXZ(P.x+mx+Math.sign(mx)*rd,P.z))P.x+=mx;
    else if(canXZ(P.x+mx,P.z))P.x+=mx*0.5;
    if(canXZ(P.x,P.z+mz+Math.sign(mz)*rd))P.z+=mz;
    else if(canXZ(P.x,P.z+mz))P.z+=mz*0.5;
  }
  P.x=Math.max(0.3,Math.min(NC*T-0.3,P.x));
  P.z=Math.max(0.3,Math.min(NR*T-0.3,P.z));
  pivot.position.set(P.x,1.35,P.z);

  items.forEach(function(it,i){
    if(!gotItem[i]){
      var d=Math.sqrt((P.x-it.x)*(P.x-it.x)+(P.z-it.z)*(P.z-it.z));
      if(d<1.15){gotItem[i]=true;scene.remove(it.mesh);if(it.gl)scene.remove(it.gl);updMis();showMsg(it.lbl+' 획득! 🎉');}
      else{it.mesh.rotation.y+=dt*2.8;it.mesh.position.y=0.75+Math.sin(now*0.003+i)*0.13;}
    }
  });

  var threat=0;
  npcs.forEach(function(n){
    tickNPC(n,dt);n.sees=losCheck(n);
    if(n.sees){threat=1;n.state='alert';n.ax=P.x;n.az=P.z;n.timer=0;}
  });
  if(threat){aLvl=Math.min(1,aLvl+2.8*dt);document.getElementById('ah').style.display='block';}
  else{aLvl=Math.max(0,aLvl-1.6*dt);if(aLvl<0.03)document.getElementById('ah').style.display='none';}
  document.getElementById('df').style.width=(aLvl*100)+'%';
  if(aLvl>=1){
    gst='over';
    setOv(true,'😱 들켰다!','부모님 시야에 포착!\n📦장애물 뒤 또는 벽 모서리로 숨으세요.','','다시 도전',function(){startRound(curR);});
    return;
  }

  if(allGot()){
    var ed=Math.sqrt((P.x-exitX)*(P.x-exitX)+(P.z-exitZ)*(P.z-exitZ));
    if(ed<2.2){
      gst='won';var ms=performance.now()-t0;
      if(!bests[curR]||ms<bests[curR])bests[curR]=ms;
      setOv(true,'🎉 탈출 성공!',
        'Round '+(curR+1)+' 클리어!\n기록: <span style="color:#f4d03f;font-size:1.1em">'+fmt(ms)+'</span>',
        '최고: '+fmt(bests[curR]),
        curR<3?'다음 라운드 →':'처음부터',
        curR<3?function(){showMenu(curR+1);}:function(){showMenu(0);});
      return;
    }
  }

  if(msgT>0){msgT-=dt*1000;if(msgT<=0)document.getElementById('mg').style.display='none';}
  drawMM();
  if(!isTouch) document.getElementById('lk').style.display=locked?'none':'flex';
  rdr.render(scene,cam);
}

// 오프닝에서 난이도 결정 후 실제 게임 시작
window._launchRound = function(roundIdx){
  showMenu(roundIdx);
  loop(0);
};
})();
