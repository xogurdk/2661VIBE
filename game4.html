<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>골목 질주 - Alley Chase</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #87CEEB;
    font-family: 'Nanum Gothic', sans-serif;
    touch-action: none;
    user-select: none;
  }
  #wrap {
    position: relative;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(180deg, #6ec6ff 0%, #b8e4ff 40%, #d4eefc 100%);
  }
  #gameCanvas {
    display: block;
    background: #87CEEB;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    border-radius: 4px;
  }
  .overlay {
    position: absolute;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    background: rgba(255,255,255,0.92);
    border-radius: 16px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.2);
    z-index: 10;
    max-width: 90vw;
    pointer-events: auto;
  }
  .overlay.active { display: flex; }
  .overlay h1 {
    font-size: 28px; font-weight: 800;
    color: #e65100;
    margin-bottom: 6px;
    text-shadow: 2px 2px 0 #ffe082;
  }
  .overlay h2 {
    font-size: 14px; font-weight: 700;
    color: #546e7a;
    letter-spacing: 3px;
    margin-bottom: 16px;
  }
  .overlay p { font-size: 13px; color: #455a64; line-height: 1.7; margin-bottom: 16px; }
  .btn {
    padding: 12px 28px;
    margin: 5px;
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 15px; font-weight: 700;
    border: none; border-radius: 24px;
    cursor: pointer;
    background: linear-gradient(135deg, #ff9800, #f57c00);
    color: #fff;
    box-shadow: 0 4px 12px rgba(245,124,0,0.4);
    transition: transform 0.1s;
  }
  .btn:hover { transform: scale(1.05); }
  .btn.secondary {
    background: linear-gradient(135deg, #78909c, #546e7a);
    box-shadow: 0 4px 12px rgba(84,110,122,0.3);
  }
  #charGrid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin: 12px 0;
    max-width: 420px;
  }
  .charCard {
    padding: 10px 6px;
    border: 2px solid #cfd8dc;
    border-radius: 12px;
    cursor: pointer;
    background: #fff;
    transition: all 0.15s;
  }
  .charCard:hover { border-color: #ff9800; transform: scale(1.03); }
  .charCard.selected { border-color: #f57c00; background: #fff3e0; box-shadow: 0 0 12px rgba(255,152,0,0.4); }
  .charCard .face { font-size: 26px; }
  .charCard .nm { font-size: 11px; font-weight: 700; color: #37474f; margin-top: 4px; }
  .charCard .food { font-size: 10px; color: #e65100; }
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 10px 14px;
    display: none;
    align-items: center;
    gap: 10px;
    z-index: 5;
    pointer-events: none;
  }
  #hud.active { display: flex; }
  #hpBar {
    flex: 1; height: 14px;
    background: rgba(255,255,255,0.6);
    border: 2px solid #fff;
    border-radius: 8px;
    overflow: hidden;
  }
  #hpFill {
    height: 100%; width: 100%;
    background: linear-gradient(90deg, #66bb6a, #43a047);
    border-radius: 6px;
    transition: width 0.15s, background 0.2s;
  }
  #hudScore { font-size: 15px; font-weight: 800; color: #fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); min-width: 72px; text-align: right; }
  #hudBoost { font-size: 12px; font-weight: 700; color: #ffeb3b; display: none; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
  #dpad {
    position: absolute;
    bottom: 16px; left: 16px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    z-index: 8;
    pointer-events: none;
  }
  #dpad.active { display: flex; }
  .dpad-row { display: flex; gap: 4px; }
  .dpad-btn {
    width: 52px; height: 52px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.35);
    color: #fff;
    font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    pointer-events: auto;
    cursor: pointer;
  }
  .dpad-btn:active { background: rgba(255,152,0,0.6); }
  #bestLabel { font-size: 12px; color: #78909c; margin-bottom: 8px; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="gameCanvas" width="480" height="800"></canvas>

  <div id="hud">
    <div id="hpBar"><div id="hpFill"></div></div>
    <div id="hudBoost">⚡ 부스트!</div>
    <div id="hudScore">0m</div>
  </div>

  <div id="dpad">
    <div class="dpad-btn" data-act="up">▲</div>
    <div class="dpad-row">
      <div class="dpad-btn" data-act="left">◀</div>
      <div class="dpad-btn" data-act="down">▼</div>
      <div class="dpad-btn" data-act="right">▶</div>
    </div>
  </div>

  <div id="screenStart" class="overlay active">
    <h1>골목 질주</h1>
    <h2>ALLEY CHASE</h2>
    <p>너고리를 쫓아 골목을 질주하세요!<br>장애물을 피하고 음식으로 체력을 유지하세요.</p>
    <div id="bestLabel">최고 기록: 0m</div>
    <button class="btn" id="btnStart">시작하기</button>
  </div>

  <div id="screenChar" class="overlay">
    <h1>캐릭터 선택</h1>
    <div id="charGrid"></div>
    <button class="btn" id="btnGo">달리기!</button>
    <button class="btn secondary" id="btnBack">뒤로</button>
  </div>

  <div id="screenPause" class="overlay">
    <h1>일시정지</h1>
    <button class="btn" id="btnResume">계속하기</button>
    <button class="btn secondary" id="btnQuit">메인으로</button>
  </div>

  <div id="screenOver" class="overlay">
    <h1>게임 오버</h1>
    <p id="overCause">장애물 충돌!</p>
    <p id="overScore">0m</p>
    <button class="btn" id="btnRetry">다시 도전</button>
    <button class="btn secondary" id="btnHomeOver">메인으로</button>
  </div>

  <div id="screenWin" class="overlay">
    <h1>🎉 잡았다!</h1>
    <p>너고리를 따라잡았습니다!</p>
    <p id="winScore">0m</p>
    <button class="btn" id="btnWinRetry">다시 플레이</button>
    <button class="btn secondary" id="btnWinHome">메인으로</button>
  </div>
</div>

<script src="fest-storage.js"></script>
<script>
(function () {
'use strict';

const W = 480, H = 800;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('wrap');

const LANE_X = [120, 240, 360];
const ROAD_L = 48, ROAD_R = 432;
const PLAYER_Y = Math.floor(H * 2 / 3);
const CATCH_DIST = 55;

const CHARACTERS = [
  { name: '강아지',   face: '🐶', food: '🦴', foodName: '개껌',       body: '#c49a6c', accent: '#8d6e4a' },
  { name: '고양이',   face: '🐱', food: '🐟', foodName: '생선',       body: '#90caf9', accent: '#5c9fd4' },
  { name: '토끼',     face: '🐰', food: '🥕', foodName: '당근',       body: '#ffccbc', accent: '#e0a090' },
  { name: '햄스터',   face: '🐹', food: '🌻', foodName: '해바라기씨', body: '#ffe082', accent: '#c9a030' },
  { name: '앵무새',   face: '🦜', food: '🌾', foodName: '사료',       body: '#a5d6a7', accent: '#66bb6a' },
  { name: '곰',       face: '🐻', food: '🥩', foodName: '고기',       body: '#bcaaa4', accent: '#8d7368' },
  { name: '하프물범', face: '🦭', food: '🧊', foodName: '얼음',       body: '#b3e5fc', accent: '#81c9e8' },
];

let saveData = { bestScore: 0, selectedChar: 0, totalWins: 0 };
let state = 'start';
let selectedChar = 0;
let gameRunning = false;
let paused = false;
let frame = 0;
let lastTs = 0;
let animId = null;

let distance = 0;
let hp = 100;
let baseSpeed = 5;
let gameSpeed = 5;
let boostTimer = 0;
let hpTimer = 0;

const player = {
  lane: 1, x: 240, y: PLAYER_Y,
  w: 38, h: 52,
  sliding: false, slideT: 0,
  onRoof: false, roofOb: null,
  jumpT: 0, jumping: false,
};

const nugori = {
  lane: 1, x: 240, y: 140,
  chaseGap: 280,
  zigT: 0, dropT: 60,
  bubbleT: 0,
};

let obstacles = [];
let foods = [];
let particles = [];
let confetti = [];
let buildings = [];
let spawnT = 0;
let parallax = { far: 0, mid: 0, near: 0 };

const keys = {};
let touchSx = 0, touchSy = 0;
let laneCool = 0;

function initBuildings() {
  buildings = [];
  for (let i = 0; i < 12; i++) {
    buildings.push({
      side: i % 2,
      h: 80 + (i * 47 % 120),
      w: 55 + (i * 31 % 40),
      color: ['#ff8a65','#4fc3f7','#fff176','#ce93d8','#80cbc4','#ffab91'][i % 6],
      winLit: (i * 17 % 5) === 0,
      offset: i * 90,
    });
  }
}

function resize() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const scale = Math.min(vw / W, vh / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
window.addEventListener('resize', resize);
resize();

function showScreen(name) {
  if (name !== 'win') confetti = [];
  ['screenStart','screenChar','screenPause','screenOver','screenWin'].forEach(id => {
    document.getElementById(id).classList.remove('active');
  });
  document.getElementById('hud').classList.toggle('active', name === 'play');
  document.getElementById('dpad').classList.toggle('active', name === 'play' && ('ontouchstart' in window || navigator.maxTouchPoints > 0));
  if (name === 'start') document.getElementById('screenStart').classList.add('active');
  else if (name === 'char') document.getElementById('screenChar').classList.add('active');
  else if (name === 'pause') document.getElementById('screenPause').classList.add('active');
  else if (name === 'over') document.getElementById('screenOver').classList.add('active');
  else if (name === 'win') document.getElementById('screenWin').classList.add('active');
  state = name;
}

function buildCharGrid() {
  const grid = document.getElementById('charGrid');
  grid.innerHTML = '';
  CHARACTERS.forEach((c, i) => {
    const d = document.createElement('div');
    d.className = 'charCard' + (i === selectedChar ? ' selected' : '');
    d.innerHTML = '<div class="face">' + c.face + '</div><div class="nm">' + c.name + '</div><div class="food">' + c.food + ' ' + c.foodName + '</div>';
    d.onclick = () => {
      selectedChar = i;
      saveData.selectedChar = i;
      persistSave();
      buildCharGrid();
    };
    grid.appendChild(d);
  });
}

function persistSave() {
  if (typeof FestStorage !== 'undefined') FestStorage.save(saveData);
}

function postScore(score, label) {
  try { window.parent.postMessage({ type: 'GAME_SCORE', gameId: 4, score: score, label: label }, '*'); } catch (e) {}
}

function resetGame() {
  distance = 0;
  hp = 100;
  frame = 0;
  baseSpeed = 5;
  gameSpeed = 5;
  boostTimer = 0;
  hpTimer = 0;
  obstacles = [];
  foods = [];
  particles = [];
  confetti = [];
  spawnT = 40;
  parallax = { far: 0, mid: 0, near: 0 };

  Object.assign(player, {
    lane: 1, x: 240, y: PLAYER_Y,
    sliding: false, slideT: 0,
    onRoof: false, roofOb: null,
    jumpT: 0, jumping: false,
  });

  Object.assign(nugori, {
    lane: 1, x: 240, y: 140,
    chaseGap: 280,
    zigT: 0, dropT: 60,
    bubbleT: 0,
  });

  updateHud();
}

function startGame() {
  resetGame();
  gameRunning = true;
  paused = false;
  showScreen('play');
  lastTs = performance.now();
  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(loop);
}

function endGame(cause) {
  gameRunning = false;
  if (Math.floor(distance) > saveData.bestScore) saveData.bestScore = Math.floor(distance);
  persistSave();
  document.getElementById('overCause').textContent = cause;
  document.getElementById('overScore').textContent = '달린 거리: ' + Math.floor(distance) + 'm';
  postScore(Math.floor(distance), Math.floor(distance) + 'm');
  showScreen('over');
}

function winGame() {
  gameRunning = false;
  saveData.totalWins = (saveData.totalWins || 0) + 1;
  if (Math.floor(distance) > saveData.bestScore) saveData.bestScore = Math.floor(distance);
  persistSave();
  document.getElementById('winScore').textContent = '달린 거리: ' + Math.floor(distance) + 'm · 승리 ' + saveData.totalWins + '회';
  postScore(Math.floor(distance), '승리 ' + Math.floor(distance) + 'm');
  spawnConfetti(120);
  showScreen('win');
}

function spawnConfetti(n) {
  const colors = ['#ff5252','#ffeb3b','#69f0ae','#40c4ff','#e040fb','#ff9800'];
  for (let i = 0; i < n; i++) {
    confetti.push({
      x: Math.random() * W, y: -10 - Math.random() * 100,
      vx: (Math.random() - 0.5) * 4,
      vy: 2 + Math.random() * 5,
      r: 4 + Math.random() * 6,
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 0.2,
      color: colors[i % colors.length],
      life: 200 + Math.random() * 100,
    });
  }
}

function updateHud() {
  const pct = Math.max(0, hp);
  const fill = document.getElementById('hpFill');
  fill.style.width = pct + '%';
  fill.style.background = pct > 50 ? 'linear-gradient(90deg,#66bb6a,#43a047)'
    : pct > 25 ? 'linear-gradient(90deg,#ffca28,#ff9800)'
    : 'linear-gradient(90deg,#ef5350,#c62828)';
  document.getElementById('hudScore').textContent = Math.floor(distance) + 'm';
  document.getElementById('hudBoost').style.display = boostTimer > 0 ? 'block' : 'none';
  document.getElementById('bestLabel').textContent = '최고 기록: ' + saveData.bestScore + 'm · 승리 ' + (saveData.totalWins || 0) + '회';
}

function moveLane(dir) {
  if (laneCool > 0) return;
  if (dir < 0 && player.lane > 0) player.lane--;
  if (dir > 0 && player.lane < 2) player.lane++;
  laneCool = 12;
}

function doSlide() {
  if (!player.sliding && !player.jumping) {
    player.sliding = true;
    player.slideT = 36;
  }
}

function doJump() {
  if (!player.jumping && !player.sliding) {
    player.jumping = true;
    player.jumpT = 22;
    player.y = PLAYER_Y - 28;
  }
}

function spawnObstacle() {
  const r = Math.random();
  const lane = Math.floor(Math.random() * 3);
  let ob;

  if (r < 0.11) {
    const startLane = Math.random() < 0.5 ? 0 : 1;
    ob = { type: 'firetruck', lane: startLane, lanes: 2, x: LANE_X[startLane] - 55, y: -110, w: 130, h: 95, roofY: 0 };
    ob.roofY = ob.y + 18;
  } else if (r < 0.20) {
    ob = { type: 'sedan', lane, x: LANE_X[lane] - 32, y: -72, w: 64, h: 72 };
  } else if (r < 0.30) {
    ob = { type: 'gasoline', lane, x: LANE_X[lane] - 14, y: -36, w: 28, h: 36 };
  } else if (r < 0.42) {
    ob = { type: 'birds', lane: Math.floor(Math.random() * 3), x: LANE_X[Math.floor(Math.random() * 3)] - 50, y: -40, w: 100, h: 36, flyY: PLAYER_Y - 42 };
  } else if (r < 0.55) {
    ob = { type: 'barrier', lane, x: LANE_X[lane] - 38, y: -58, w: 76, h: 58 };
  } else if (r < 0.72) {
    ob = { type: 'box', lane, x: LANE_X[lane] - 22, y: -44, w: 44, h: 44 };
  } else {
    ob = { type: 'stone', lane, x: LANE_X[lane] - 18, y: -28, w: 36, h: 28 };
  }
  obstacles.push(ob);
}

function spawnFoodFromNugori() {
  const c = CHARACTERS[selectedChar];
  const isSpecial = Math.random() < 0.45;
  const emoji = isSpecial ? c.food : ['🍙','🍞','🍎','🥐','🍡','🧁'][Math.floor(Math.random() * 6)];
  foods.push({
    x: nugori.x + (Math.random() - 0.5) * 30,
    y: nugori.y + 40,
    lane: nugori.lane,
    emoji, special: emoji === c.food,
    bob: Math.random() * 6.28,
  });
}

function playerHitbox() {
  const h = player.sliding ? 28 : (player.jumping ? 44 : 52);
  const y = player.onRoof ? player.y : (player.sliding ? PLAYER_Y - 10 : (player.jumping ? player.y : PLAYER_Y - h));
  return { x: player.x - player.w / 2, y, w: player.w, h };
}

function rectsOverlap(a, b, margin) {
  margin = margin || 4;
  return a.x + margin < b.x + b.w - margin &&
         a.x + a.w - margin > b.x + margin &&
         a.y + margin < b.y + b.h - margin &&
         a.y + a.h - margin > b.y + margin;
}

function laneMatch(pl, ob) {
  if (ob.type === 'firetruck') {
    return pl.lane >= ob.lane && pl.lane <= ob.lane + 1;
  }
  if (ob.type === 'birds') return Math.abs(pl.x - (ob.x + ob.w / 2)) < 55;
  return pl.lane === ob.lane || Math.abs(pl.x - (ob.x + ob.w / 2)) < 36;
}

function update(dt) {
  if (!gameRunning || paused) return;
  frame++;

  baseSpeed = 5 + Math.floor(distance / 300) * 1.2;
  if (boostTimer > 0) {
    boostTimer -= dt;
    gameSpeed = baseSpeed * 1.55;
  } else {
    gameSpeed = baseSpeed;
  }

  distance += gameSpeed * dt * 0.012;
  parallax.far += gameSpeed * 0.15 * dt;
  parallax.mid += gameSpeed * 0.35 * dt;
  parallax.near += gameSpeed * 0.6 * dt;

  hpTimer += dt;
  if (hpTimer >= 1000) {
    hpTimer -= 1000;
    hp -= 1;
    if (hp <= 0) { endGame('체력이 모두 소진되었습니다'); return; }
  }

  nugori.chaseGap -= gameSpeed * dt * 0.008;
  nugori.y = PLAYER_Y - nugori.chaseGap;
  if (nugori.chaseGap <= CATCH_DIST) { winGame(); return; }

  nugori.zigT += dt;
  if (nugori.zigT > 1400) {
    nugori.zigT = 0;
    nugori.lane = Math.floor(Math.random() * 3);
  }
  nugori.x += (LANE_X[nugori.lane] - nugori.x) * 0.06;

  nugori.dropT -= dt;
  if (nugori.dropT <= 0) {
    nugori.dropT = 1200 + Math.random() * 1200;
    spawnFoodFromNugori();
  }
  nugori.bubbleT += dt;

  player.x += (LANE_X[player.lane] - player.x) * 0.18;
  if (laneCool > 0) laneCool--;

  if (player.sliding) {
    player.slideT--;
    if (player.slideT <= 0) player.sliding = false;
  }
  if (player.jumping) {
    player.jumpT--;
    if (player.jumpT <= 0) { player.jumping = false; player.y = PLAYER_Y; }
    else if (player.jumpT < 10) player.y += 2.5;
  }

  if (player.onRoof && player.roofOb) {
    const ob = player.roofOb;
    if (!obstacles.includes(ob)) {
      player.onRoof = false;
      player.roofOb = null;
      player.y = PLAYER_Y;
    } else {
      player.y = ob.y + 14;
      player.x += (ob.x + ob.w / 2 - player.x) * 0.3;
    }
  }

  spawnT -= dt;
  if (spawnT <= 0) {
    spawnT = 900 - Math.min(500, distance * 0.8) + Math.random() * 600;
    spawnObstacle();
    if (Math.random() < 0.25) spawnObstacle();
  }

  const ph = playerHitbox();

  for (let i = obstacles.length - 1; i >= 0; i--) {
    const ob = obstacles[i];
    ob.y += gameSpeed * dt * 0.09;
    if (ob.type === 'firetruck') ob.roofY = ob.y + 18;

    if (ob.y > H + 80) { obstacles.splice(i, 1); continue; }

    if (ob.type === 'gasoline') {
      const gb = { x: ob.x, y: ob.y, w: ob.w, h: ob.h };
      if (rectsOverlap(ph, gb, 2)) {
        boostTimer = 3000;
        spawnBurst(ob.x + ob.w / 2, ob.y + ob.h / 2, '#ff9800', 10);
        obstacles.splice(i, 1);
      }
      continue;
    }

    if (ob.type === 'firetruck') {
      const roof = { x: ob.x + 8, y: ob.y + 14, w: ob.w - 16, h: 14 };
      const onTop = player.jumping && laneMatch(player, ob) &&
        ph.y + ph.h > roof.y - 8 && ph.y < roof.y + 20 && ob.y + ob.h > PLAYER_Y - 80;
      if (onTop) {
        player.onRoof = true;
        player.roofOb = ob;
        player.jumping = false;
        player.y = ob.y + 14;
      }
      const body = { x: ob.x, y: ob.y + 28, w: ob.w, h: ob.h - 28 };
      if (!player.onRoof && laneMatch(player, ob) && rectsOverlap(ph, body)) {
        endGame('소방차에 부딪혔습니다'); return;
      }
      continue;
    }

    if (ob.type === 'birds') {
      const flyY = PLAYER_Y - (player.sliding ? 18 : 48);
      const bb = { x: ob.x, y: flyY, w: ob.w, h: 34 };
      if (laneMatch(player, ob) && rectsOverlap(ph, bb) && !player.sliding) {
        endGame('새 떼에 맞았습니다'); return;
      }
      continue;
    }

    const bb = { x: ob.x, y: ob.y, w: ob.w, h: ob.h };
    if (laneMatch(player, ob) && rectsOverlap(ph, bb)) {
      const names = { sedan: '승용차', box: '상자', stone: '돌', barrier: '공사 바리케이드' };
      endGame((names[ob.type] || '장애물') + '에 부딪혔습니다!'); return;
    }
  }

  for (let i = foods.length - 1; i >= 0; i--) {
    const f = foods[i];
    f.y += gameSpeed * dt * 0.085;
    f.bob += dt * 0.006;
    if (f.y > H + 30) { foods.splice(i, 1); continue; }
    const fb = { x: f.x - 14, y: f.y - 14, w: 28, h: 28 };
    if (rectsOverlap(ph, fb, 0)) {
      hp = Math.min(100, hp + (f.special ? 20 : 10));
      spawnBurst(f.x, f.y, f.special ? '#ffd54f' : '#81c784', 6);
      foods.splice(i, 1);
    }
  }

  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life -= dt * 0.06;
  });
  particles = particles.filter(p => p.life > 0);

  confetti.forEach(c => {
    c.x += c.vx; c.y += c.vy; c.vy += 0.04; c.rot += c.vr; c.life -= dt * 0.05;
  });
  confetti = confetti.filter(c => c.life > 0);

  updateHud();
}

function spawnBurst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 5,
      vy: -Math.random() * 4 - 1,
      color,
      life: 40 + Math.random() * 20,
      r: 2 + Math.random() * 3,
    });
  }
}

function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#64b5f6');
  g.addColorStop(0.45, '#90caf9');
  g.addColorStop(0.7, '#bbdefb');
  g.addColorStop(1, '#e3f2fd');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.arc(380, 90, 42, 0, Math.PI * 2);
  ctx.arc(420, 88, 32, 0, Math.PI * 2);
  ctx.arc(350, 95, 28, 0, Math.PI * 2);
  ctx.fill();
}

function drawParallaxBuildings() {
  buildings.forEach((b, i) => {
    const scroll = b.side === 0 ? parallax.far : parallax.mid;
    const bx = b.side === 0 ? ROAD_L - b.w - 8 : ROAD_R + 8;
    const by = 180 - b.h + ((scroll + b.offset) % (b.h + 60));
    ctx.fillStyle = b.color;
    ctx.fillRect(bx, by, b.w, b.h + 200);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    for (let row = 0; row < 8; row++) {
      for (let col = 0; col < 2; col++) {
        if ((i + row + col) % 3 !== 0) {
          ctx.fillRect(bx + 8 + col * 22, by + 12 + row * 22, 14, 12);
        }
      }
    }
    if (b.winLit) {
      ctx.fillStyle = '#fff9c4';
      ctx.fillRect(bx + 10, by + 20, 18, 14);
    }
    ctx.fillStyle = '#546e7a';
    ctx.font = 'bold 11px Nanum Gothic';
    const signs = ['분식','편의','카페','약국','빨래','꽃집'];
    ctx.fillText(signs[i % signs.length], bx + 6, by + b.h - 8);
  });
}

function drawRoad() {
  ctx.fillStyle = '#455a64';
  ctx.fillRect(ROAD_L - 12, 0, ROAD_R - ROAD_L + 24, H);

  ctx.fillStyle = '#37474f';
  ctx.fillRect(ROAD_L, 0, ROAD_R - ROAD_L, H);

  const laneOff = parallax.near % 48;
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 2;
  ctx.setLineDash([16, 24]);
  [ROAD_L + (ROAD_R - ROAD_L) / 3, ROAD_L + 2 * (ROAD_R - ROAD_L) / 3].forEach(lx => {
    ctx.beginPath();
    ctx.moveTo(lx, -laneOff);
    ctx.lineTo(lx, H);
    ctx.stroke();
  });
  ctx.setLineDash([]);

  ctx.fillStyle = '#ffd54f';
  ctx.fillRect(ROAD_L, 0, 4, H);
  ctx.fillRect(ROAD_R - 4, 0, 4, H);
}

function drawCharacter(x, y, char, sliding, jumping) {
  const h = sliding ? 30 : 52;
  const cy = sliding ? y - 8 : y;

  ctx.save();
  ctx.translate(x, cy);

  if (sliding) ctx.scale(1, 0.72);

  ctx.fillStyle = char.body;
  ctx.beginPath();
  ctx.roundRect(-16, -h + 8, 32, h - 8, 10);
  ctx.fill();
  ctx.strokeStyle = char.accent;
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = char.accent;
  ctx.beginPath();
  ctx.ellipse(-10, -4, 6, 9, 0.3, 0, Math.PI * 2);
  ctx.ellipse(10, -4, 6, 9, -0.3, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = char.body;
  ctx.beginPath();
  ctx.arc(0, -h + 14, 15, 0, Math.PI * 2);
  ctx.fill();

  ctx.font = jumping ? '22px serif' : '20px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(char.face, 0, -h + 14);

  const legSwing = Math.sin(frame * 0.25) * 6;
  if (!sliding && !jumping) {
    ctx.strokeStyle = char.accent;
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-8, 0); ctx.lineTo(-8 + legSwing, 14);
    ctx.moveTo(8, 0); ctx.lineTo(8 - legSwing, 14);
    ctx.stroke();
  }

  ctx.restore();
}

function drawNugori() {
  const x = nugori.x, y = nugori.y;

  if (Math.sin(nugori.bubbleT * 0.004) > -0.2) {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.roundRect(x - 38, y - 58, 76, 32, 10);
    ctx.fill();
    ctx.strokeStyle = '#37474f';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#37474f';
    ctx.font = 'bold 14px Nanum Gothic';
    ctx.textAlign = 'center';
    ctx.fillText('도망!', x, y - 38);
    ctx.beginPath();
    ctx.moveTo(x - 6, y - 26);
    ctx.lineTo(x, y - 18);
    ctx.lineTo(x + 6, y - 26);
    ctx.fill();
  }

  ctx.save();
  ctx.translate(x, y);

  ctx.fillStyle = '#8d6e63';
  ctx.beginPath();
  ctx.ellipse(0, 8, 20, 24, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#efebe9';
  ctx.beginPath();
  ctx.ellipse(0, 14, 12, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#6d4c41';
  for (let i = -1; i <= 1; i++) {
    ctx.fillRect(i * 8 - 2, 0, 4, 18);
  }

  ctx.fillStyle = '#5d4037';
  ctx.beginPath();
  ctx.arc(0, -10, 16, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(-8, -12, 9, 7, -0.2, 0, Math.PI * 2);
  ctx.ellipse(8, -12, 9, 7, 0.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#212121';
  ctx.beginPath();
  ctx.arc(-8, -12, 4, 0, Math.PI * 2);
  ctx.arc(8, -12, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-6, -13, 1.5, 0, Math.PI * 2);
  ctx.arc(10, -13, 1.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#212121';
  ctx.beginPath();
  ctx.ellipse(0, -6, 5, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = 'rgba(255,138,128,0.55)';
  ctx.beginPath();
  ctx.ellipse(-14, -4, 6, 4, 0, 0, Math.PI * 2);
  ctx.ellipse(14, -4, 6, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#5d4037';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-18, -18);
  ctx.quadraticCurveTo(-24, -28, -16, -32);
  ctx.moveTo(18, -18);
  ctx.quadraticCurveTo(24, -28, 16, -32);
  ctx.stroke();

  ctx.fillStyle = '#ff8a65';
  ctx.font = 'bold 10px Nanum Gothic';
  ctx.textAlign = 'center';
  ctx.fillText('너고리', 0, -36);

  ctx.restore();
}

function drawObstacle(ob) {
  ctx.save();
  switch (ob.type) {
    case 'sedan':
      ctx.fillStyle = '#1565c0';
      ctx.beginPath();
      ctx.roundRect(ob.x, ob.y, ob.w, ob.h, 6);
      ctx.fill();
      ctx.fillStyle = 'rgba(187,222,251,0.85)';
      ctx.fillRect(ob.x + 8, ob.y + 8, ob.w - 16, 22);
      ctx.fillStyle = '#212121';
      ctx.fillRect(ob.x + 4, ob.y + ob.h - 8, 18, 10);
      ctx.fillRect(ob.x + ob.w - 22, ob.y + ob.h - 8, 18, 10);
      ctx.fillStyle = '#ffeb3b';
      ctx.fillRect(ob.x + 2, ob.y + 30, 8, 6);
      break;
    case 'firetruck':
      ctx.fillStyle = '#d32f2f';
      ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
      ctx.fillStyle = '#b71c1c';
      ctx.fillRect(ob.x + 4, ob.y + 4, ob.w - 8, 14);
      ctx.fillStyle = 'rgba(187,222,251,0.8)';
      ctx.fillRect(ob.x + 10, ob.y + 24, 36, 20);
      ctx.fillStyle = '#ff9800';
      ctx.fillRect(ob.x + 55, ob.y + 20, ob.w - 65, 40);
      ctx.fillStyle = frame % 20 < 10 ? '#ff1744' : '#ffea00';
      ctx.fillRect(ob.x + 12, ob.y - 6, 14, 8);
      ctx.fillRect(ob.x + ob.w - 26, ob.y - 6, 14, 8);
      ctx.fillStyle = '#cfd8dc';
      ctx.fillRect(ob.x + 20, ob.y + 14, 8, 28);
      ctx.fillRect(ob.x + ob.w - 28, ob.y + 14, 8, 28);
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.setLineDash([4, 4]);
      ctx.strokeRect(ob.x + 8, ob.y + 14, ob.w - 16, 10);
      ctx.setLineDash([]);
      ctx.fillStyle = '#212121';
      [ob.x + 12, ob.x + 52, ob.x + ob.w - 24].forEach(wx => {
        ctx.beginPath();
        ctx.arc(wx, ob.y + ob.h - 2, 9, 0, Math.PI * 2);
        ctx.fill();
      });
      break;
    case 'box':
      ctx.fillStyle = '#a1887f';
      ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
      ctx.strokeStyle = '#6d4c41';
      ctx.lineWidth = 2;
      ctx.strokeRect(ob.x, ob.y, ob.w, ob.h);
      ctx.beginPath();
      ctx.moveTo(ob.x + 4, ob.y + 4); ctx.lineTo(ob.x + ob.w - 4, ob.y + ob.h - 4);
      ctx.moveTo(ob.x + ob.w - 4, ob.y + 4); ctx.lineTo(ob.x + 4, ob.y + ob.h - 4);
      ctx.stroke();
      break;
    case 'stone':
      ctx.fillStyle = '#78909c';
      ctx.beginPath();
      ctx.ellipse(ob.x + ob.w / 2, ob.y + ob.h / 2, ob.w / 2, ob.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#546e7a';
      ctx.stroke();
      break;
    case 'gasoline':
      ctx.fillStyle = '#ff6f00';
      ctx.beginPath();
      ctx.roundRect(ob.x, ob.y, ob.w, ob.h, 4);
      ctx.fill();
      ctx.fillStyle = '#212121';
      ctx.fillRect(ob.x + 6, ob.y + 4, 16, 8);
      ctx.fillStyle = '#ffeb3b';
      ctx.font = '16px serif';
      ctx.fillText('⛽', ob.x + 4, ob.y + 28);
      break;
    case 'birds':
      ctx.font = '22px serif';
      for (let i = 0; i < 5; i++) {
        const bx = ob.x + i * 20 + Math.sin(frame * 0.1 + i) * 4;
        const by = PLAYER_Y - 42 + Math.cos(frame * 0.08 + i) * 3;
        ctx.fillText('🐦', bx, by);
      }
      break;
    case 'barrier':
      ctx.fillStyle = '#ff9800';
      ctx.fillRect(ob.x, ob.y + 20, ob.w, ob.h - 20);
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 4; i++) ctx.fillRect(ob.x + i * 20, ob.y + 24, 10, ob.h - 28);
      ctx.fillStyle = '#37474f';
      ctx.fillRect(ob.x, ob.y, ob.w, 22);
      ctx.fillStyle = '#ffeb3b';
      ctx.font = 'bold 11px Nanum Gothic';
      ctx.fillText('공사중', ob.x + 12, ob.y + 15);
      break;
  }
  ctx.restore();
}

function drawFoods() {
  foods.forEach(f => {
    const bob = Math.sin(f.bob) * 4;
    ctx.font = (f.special ? '26px' : '22px') + ' serif';
    ctx.textAlign = 'center';
    if (f.special) {
      ctx.shadowColor = '#ffd54f';
      ctx.shadowBlur = 12;
    }
    ctx.fillText(f.emoji, f.x, f.y + bob);
    ctx.shadowBlur = 0;
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = Math.min(1, p.life / 30);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });
}

function drawConfetti() {
  confetti.forEach(c => {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    ctx.globalAlpha = Math.min(1, c.life / 60);
    ctx.fillStyle = c.color;
    ctx.fillRect(-c.r / 2, -c.r / 2, c.r, c.r * 0.6);
    ctx.restore();
    ctx.globalAlpha = 1;
  });
}

function drawChaseBar() {
  const pct = 1 - nugori.chaseGap / 280;
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(14, 14, 120, 10);
  ctx.fillStyle = '#ff9800';
  ctx.fillRect(14, 14, 120 * Math.max(0, Math.min(1, pct)), 10);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px Nanum Gothic';
  ctx.textAlign = 'left';
  ctx.fillText('추격', 14, 10);
}

function render() {
  ctx.clearRect(0, 0, W, H);
  drawSky();
  drawParallaxBuildings();
  drawRoad();
  drawChaseBar();

  obstacles.forEach(drawObstacle);
  drawFoods();
  drawNugori();

  const char = CHARACTERS[selectedChar];
  const py = player.onRoof ? player.y + 38 : (player.jumping ? player.y : PLAYER_Y);
  drawCharacter(player.x, py, char, player.sliding, player.jumping);

  drawParticles();
  drawConfetti();

  if (state === 'start' || state === 'char') {
    drawSky();
    drawParallaxBuildings();
    drawRoad();
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillRect(0, 0, W, H);
  }
}

function loop(ts) {
  const dt = Math.min(50, ts - lastTs);
  lastTs = ts;
  update(dt);
  render();
  if (gameRunning || confetti.length > 0 || state === 'win') {
    animId = requestAnimationFrame(loop);
  }
}

function idlePreview() {
  if (gameRunning) return;
  parallax.far += 0.4;
  parallax.mid += 0.7;
  parallax.near += 1.2;
  render();
  requestAnimationFrame(idlePreview);
}

document.getElementById('btnStart').onclick = () => { buildCharGrid(); showScreen('char'); };
document.getElementById('btnBack').onclick = () => showScreen('start');
document.getElementById('btnGo').onclick = startGame;
document.getElementById('btnResume').onclick = () => { paused = false; showScreen('play'); lastTs = performance.now(); };
document.getElementById('btnQuit').onclick = () => { gameRunning = false; showScreen('start'); };
document.getElementById('btnRetry').onclick = startGame;
document.getElementById('btnHomeOver').onclick = () => showScreen('start');
document.getElementById('btnWinRetry').onclick = startGame;
document.getElementById('btnWinHome').onclick = () => showScreen('start');

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'Escape') {
    if (!gameRunning) return;
    if (paused) { paused = false; showScreen('play'); lastTs = performance.now(); }
    else { paused = true; showScreen('pause'); }
    e.preventDefault();
    return;
  }
  if (!gameRunning || paused) return;
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') moveLane(-1);
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') moveLane(1);
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') doJump();
  if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') doSlide();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('touchstart', e => {
  touchSx = e.touches[0].clientX;
  touchSy = e.touches[0].clientY;
}, { passive: true });

canvas.addEventListener('touchend', e => {
  if (!gameRunning || paused) return;
  const dx = e.changedTouches[0].clientX - touchSx;
  const dy = e.changedTouches[0].clientY - touchSy;
  const th = 28;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx < -th) moveLane(-1);
    else if (dx > th) moveLane(1);
  } else {
    if (dy < -th) doJump();
    else if (dy > th) doSlide();
  }
}, { passive: true });

document.querySelectorAll('.dpad-btn').forEach(btn => {
  const act = btn.dataset.act;
  const fn = () => {
    if (!gameRunning || paused) return;
    if (act === 'left') moveLane(-1);
    if (act === 'right') moveLane(1);
    if (act === 'up') doJump();
    if (act === 'down') doSlide();
  };
  btn.addEventListener('touchstart', e => { e.preventDefault(); fn(); }, { passive: false });
  btn.addEventListener('mousedown', e => { e.preventDefault(); fn(); });
});

initBuildings();
if (typeof FestStorage !== 'undefined') {
  FestStorage.init(4);
  FestStorage.onReady(function () {
    saveData = FestStorage.merge({ bestScore: 0, selectedChar: 0, totalWins: 0 });
    selectedChar = saveData.selectedChar || 0;
    updateHud();
  });
}
showScreen('start');
idlePreview();

})();
</script>
</body>
</html>
