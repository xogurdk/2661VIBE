<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>8-BIT RHYTHM RUNNER - PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; user-select: none; image-rendering: pixelated; }
        body { margin: 0; padding: 0; background-color: #1a1a1a; color: #fff; font-family: 'Press Start 2P', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        #game-container { position: relative; width: 800px; height: 500px; background-color: #000; border: 6px solid #fff; overflow: hidden; }
        
        /* 캔버스만 반전시키고 UI는 고정하기 위해 캔버스 전용 클래스 설정 */
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; }
        .flip-x { transform: scaleX(-1); }
        .flip-y { transform: scaleY(-1); }
        .flip-both { transform: scale(-1, -1); }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 5; }
        .active { display: flex; }

        /* UI 레이어 (반전 영향을 받지 않음) */
        #game-ui { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; display: none; justify-content: space-between; align-items: center; pointer-events: none; z-index: 10; }
        #progress-wrapper { width: 50%; height: 16px; border: 3px solid #fff; background: #000; }
        #progress-bar { width: 0%; height: 100%; background: #00ffcc; }
        
        h1 { font-size: 24px; margin-bottom: 20px; text-shadow: 4px 4px #ff0055; text-align: center; }
        .btn { background-color: #222; border: 4px solid #fff; color: #fff; font-family: 'Press Start 2P', monospace; font-size: 10px; padding: 12px; cursor: pointer; transition: 0.1s; }
        .btn:hover { background-color: #fff; color: #000; }
        
        #level-select-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 90%; margin-top: 10px; }
        
        .modal { position: absolute; top: 10%; left: 10%; width: 80%; height: 80%; background: #111; border: 6px solid #fff; z-index: 100; display: none; flex-direction: column; padding: 20px; }
        .shop-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; overflow-y: auto; }
        .shop-item { border: 2px solid #555; padding: 10px; display: flex; flex-direction: column; align-items: center; font-size: 8px; gap: 5px; }
        
        textarea { width: 100%; height: 100px; background: #000; color: #0f0; border: 2px solid #fff; font-family: monospace; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="game-ui">
        <div id="progress-wrapper"><div id="progress-bar"></div></div>
        <div style="font-size:10px;">LV:<span id="hud-lv">1</span> | <span id="hud-coin">0</span></div>
    </div>

    <canvas id="game-canvas" width="800" height="500"></canvas>

    <div id="screen-home" class="screen active">
        <h1>RHYTHM<br>DASH PRO</h1>
        <div style="font-size:10px; margin-bottom:15px;">코인: <span id="home-coin">0</span></div>
        <div id="level-select-container"></div>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="btn" onclick="openModal('modal-shop')">상점</button>
            <button class="btn" onclick="openModal('modal-editor')">맵 편집</button>
            <button class="btn" onclick="initAudio()">오디오 시작</button>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <h1 id="res-msg">GAME OVER</h1>
        <div id="res-stats" style="font-size:10px; line-height:2; text-align:center;"></div>
        <button class="btn" style="margin-top:20px;" onclick="location.reload()">홈으로</button>
    </div>

    <div id="modal-shop" class="modal">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span>스킨 상점</span>
            <span onclick="closeModal('modal-shop')" style="cursor:pointer;">X</span>
        </div>
        <div class="shop-grid" id="shop-items"></div>
    </div>

    <div id="modal-editor" class="modal">
        <div style="margin-bottom:10px;">맵 코드 입력 (JSON)</div>
        <textarea id="editor-code">[{"t":"spike","x":500},{"t":"pad","x":800},{"t":"block","x":1200,"h":3}]</textarea>
        <button class="btn" style="margin-top:10px;" onclick="saveCustomMap()">커스텀 맵 저장 및 레벨 1 적용</button>
        <button class="btn" style="margin-top:5px;" onclick="closeModal('modal-editor')">닫기</button>
    </div>
</div>

<script>
    // --- 1. 데이터 저장 및 로드 (LocalStorage) ---
    let gameData = {
        coins: 0,
        purchased: ['default'],
        skin: 'default',
        customMap: null
    };

    function loadGame() {
        const saved = localStorage.getItem('rhythm_dash_save');
        if (saved) {
            gameData = JSON.parse(saved);
            // 구버전 호환용 초기화
            if (!gameData.purchased) gameData.purchased = ['default'];
        }
        updateUI();
    }

    function saveGame() {
        localStorage.setItem('rhythm_dash_save', JSON.stringify(gameData));
        updateUI();
    }

    function updateUI() {
        document.getElementById('home-coin').innerText = gameData.coins;
        document.getElementById('hud-coin').innerText = gameData.coins;
    }

    // --- 2. 이미지 및 캐릭터 설정 ---
    const coinImg = new Image();
    coinImg.src = 'https://googleusercontent.com/ia_resource/b316f39d2011b7b7'; // 업로드하신 코인 이미지

    const skins = [
        { id: 'default', name: '기본 사각', icon: '■', price: 0 },
        { id: 'mint', name: '민트색', icon: '▣', price: 10 },
        { id: 'cat', name: '고양이', icon: '🐱', price: 20 },
        { id: 'frog', name: '개구리', icon: '🐸', price: 20 },
        { id: 'dog', name: '강아지', icon: '🐶', price: 30 },
        { id: 'seal', name: '하프물범', icon: '🦭', price: 30 },
        { id: 'lion', name: '사자', icon: '🦁', price: 50 }
    ];

    // --- 3. 게임 엔진 변수 ---
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    let gameState = 'HOME';
    let currentLv = 1;
    let cameraX = 0;
    let mapWidth = 8000;
    let player, obstacles, coinsArr, portals, particles;
    let audioCtx, nextBeat, bpm = 135;

    // --- 4. 오디오 엔진 (리듬감 강화) ---
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            setInterval(audioScheduler, 25);
        }
    }

    function audioScheduler() {
        if (gameState !== 'PLAY') return;
        while (nextBeat < audioCtx.currentTime + 0.1) {
            if (nextBeat === 0) nextBeat = audioCtx.currentTime;
            playRhythm(nextBeat);
            nextBeat += 60 / bpm / 2;
        }
    }

    function playRhythm(time) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = (Math.random() > 0.5) ? 'square' : 'triangle';
        osc.frequency.setValueAtTime(110 + (Math.random() * 20), time);
        gain.gain.setValueAtTime(0.05, time);
        gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(time); osc.stop(time + 0.1);
    }

    // --- 5. 게임 로직 ---
    function startGame(lv) {
        initAudio();
        gameState = 'PLAY';
        currentLv = lv;
        cameraX = 0;
        player = {
            x: 100, y: 350, w: 30, h: 30,
            vy: 0, grav: 0.8, jump: -15,
            mode: 'NORMAL', jumps: 0, maxJumps: (lv >= 4 ? 2 : 1)
        };
        obstacles = []; coinsArr = []; portals = []; particles = [];
        
        document.getElementById('screen-home').classList.remove('active');
        document.getElementById('game-ui').style.display = 'flex';
        document.getElementById('hud-lv').innerText = lv;
        canvas.className = ''; // 반전 초기화

        buildMap(lv);
        requestAnimationFrame(loop);
    }

    function buildMap(lv) {
        // 커스텀 맵 적용
        if (lv === 1 && gameData.customMap) {
            gameData.customMap.forEach(o => {
                if(o.t === 'spike') obstacles.push({x:o.x, y:370, w:30, h:30, type:'spike'});
                if(o.t === 'pad') obstacles.push({x:o.x, y:370, w:40, h:10, type:'pad'});
                if(o.t === 'block') obstacles.push({x:o.x, y:400-(o.h*30), w:40, h:o.h*30, type:'block'});
            });
        } else {
            // 랜덤 생성 알고리즘
            for (let x = 600; x < mapWidth - 800; x += 200 + Math.random() * 200) {
                let r = Math.random();
                if (r < 0.4) obstacles.push({x, y:370, w:30, h:30, type:'spike'});
                else if (r < 0.6) obstacles.push({x, y:380, w:50, h:20, type:'pad'}); // 점프 패드
                else obstacles.push({x, y:300, w:40, h:100, type:'block'});
                
                if (Math.random() < 0.3) coinsArr.push({x: x + 50, y: 300, collected: false});
            }
        }
        // 포탈 배치
        portals.push({x: 2000, type: 'FLY'}, {x: 4000, type: 'INVERT'}, {x: 6000, type: 'TOWER'});
    }

    function loop() {
        if (gameState !== 'PLAY') return;
        update();
        draw();
        requestAnimationFrame(loop);
    }

    function update() {
        let speed = 5 + currentLv * 0.5;
        player.x += speed;
        cameraX = player.x - 150;

        // 진행률
        let prog = Math.min(100, (player.x / mapWidth) * 100);
        document.getElementById('progress-bar').style.width = prog + '%';

        // 물리
        if (player.mode === 'FLY') {
            player.vy += 0.4;
            player.y += player.vy;
            if (player.y > 370) player.y = 370;
            if (player.y < 50) player.y = 50;
        } else {
            player.vy += player.grav;
            player.y += player.vy;
            if (player.y > 370) {
                player.y = 370;
                player.vy = 0;
                player.jumps = 0;
            }
        }

        // 포탈 감지
        portals.forEach(p => {
            if (Math.abs(player.x - p.x) < 10) {
                player.mode = p.type;
                if (p.type === 'INVERT') {
                    // 화면 반전 (UI 제외 캔버스만)
                    let dice = Math.random();
                    canvas.className = dice < 0.5 ? 'flip-y' : 'flip-x';
                }
            }
        });

        // 장애물 충돌
        obstacles.forEach(o => {
            if (checkColl(player, o)) {
                if (o.type === 'pad') {
                    player.vy = -22; // 2단 점프 패드
                    player.jumps = 0;
                } else if (o.type === 'block' && player.vy > 0 && player.y < o.y) {
                    player.y = o.y - player.h;
                    player.vy = 0;
                    player.jumps = 0;
                } else {
                    endGame(false);
                }
            }
        });

        // 코인 획득
        coinsArr.forEach(c => {
            if (!c.collected && Math.abs(player.x - c.x) < 30 && Math.abs(player.y - c.y) < 30) {
                c.collected = true;
                gameData.coins++;
                saveGame();
            }
        });

        if (prog >= 100) endGame(true);
    }

    function draw() {
        ctx.clearRect(0, 0, 800, 500);
        
        // 배경 밝기 조절 (5단계 이상은 어둡지만 보이게)
        let brightness = currentLv >= 5 ? 30 : 60;
        ctx.fillStyle = `rgb(${brightness}, ${brightness}, ${brightness + 20})`;
        ctx.fillRect(0, 0, 800, 500);

        ctx.save();
        ctx.translate(-cameraX, 0);

        // 바닥
        ctx.strokeStyle = '#fff';
        ctx.beginPath(); ctx.moveTo(cameraX, 400); ctx.lineTo(cameraX + 800, 400); ctx.stroke();

        // 장애물
        obstacles.forEach(o => {
            if (o.type === 'spike') {
                ctx.fillStyle = '#ff4444';
                ctx.beginPath(); ctx.moveTo(o.x, o.y+o.h); ctx.lineTo(o.x+o.w/2, o.y); ctx.lineTo(o.x+o.w, o.y+o.h); ctx.fill();
            } else if (o.type === 'pad') {
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(o.x, o.y, o.w, o.h);
            } else {
                ctx.fillStyle = '#aaa';
                ctx.fillRect(o.x, o.y, o.w, o.h);
            }
        });

        // 코인 (이미지 사용)
        coinsArr.forEach(c => {
            if (!c.collected) ctx.drawImage(coinImg, c.x, c.y, 30, 30);
        });

        // 플레이어
        ctx.font = '20px Arial';
        let skin = skins.find(s => s.id === gameData.skin);
        
        if (player.mode === 'FLY') {
            ctx.fillStyle = '#fff';
            ctx.fillText('✈️', player.x, player.y + 20); // 비행 모드 비행기
        } else {
            ctx.fillText(skin.icon, player.x, player.y + 20);
        }

        ctx.restore();
    }

    function checkColl(p, o) {
        return p.x < o.x + o.w && p.x + p.w > o.x && p.y < o.y + o.h && p.y + p.h > o.y;
    }

    function endGame(win) {
        gameState = 'RESULT';
        saveGame();
        document.getElementById('screen-result').classList.add('active');
        document.getElementById('res-msg').innerText = win ? "CLEAR!" : "GAME OVER";
        document.getElementById('res-msg').style.color = win ? "#0f0" : "#f00";
    }

    // --- 6. 상점 및 에디터 기능 ---
    function openModal(id) {
        if (id === 'modal-shop') renderShop();
        document.getElementById(id).style.display = 'flex';
    }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function renderShop() {
        const container = document.getElementById('shop-items');
        container.innerHTML = '';
        skins.forEach(s => {
            const isBought = gameData.purchased.includes(s.id);
            const div = document.createElement('div');
            div.className = 'shop-item';
            div.innerHTML = `
                <div style="font-size:20px;">${s.icon}</div>
                <div>${s.name}</div>
                <div>${isBought ? '보유중' : s.price + '코인'}</div>
                <button class="btn" onclick="buyItem('${s.id}', ${s.price})">${isBought ? '착용' : '구매'}</button>
            `;
            container.appendChild(div);
        });
    }

    function buyItem(id, price) {
        if (gameData.purchased.includes(id)) {
            gameData.skin = id;
            alert('착용 완료!');
        } else if (gameData.coins >= price) {
            gameData.coins -= price;
            gameData.purchased.push(id);
            gameData.skin = id;
            alert('구매 성공!');
        } else {
            alert('코인이 부족합니다!');
        }
        saveGame();
        renderShop();
    }

    function saveCustomMap() {
        try {
            const code = document.getElementById('editor-code').value;
            gameData.customMap = JSON.parse(code);
            saveGame();
            alert('커스텀 맵이 레벨 1에 저장되었습니다.');
            closeModal('modal-editor');
        } catch(e) {
            alert('코드 형식이 올바르지 않습니다.');
        }
    }

    // 초기 실행
    loadGame();
    const lvlContainer = document.getElementById('level-select-container');
    for (let i = 1; i <= 10; i++) {
        const b = document.createElement('button');
        b.className = 'btn'; b.innerText = i;
        b.onclick = () => startGame(i);
        lvlContainer.appendChild(b);
    }

    window.addEventListener('keydown', e => {
        if (e.code === 'Space' && gameState === 'PLAY') {
            if (player.mode === 'FLY') {
                player.vy = -8;
            } else if (player.jumps < player.maxJumps) {
                player.vy = player.jump;
                player.jumps++;
            }
        }
    });
</script>

</body>
</html>
